<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航线自动生成工具</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="data/airline/航线信息表_含CZML_最小连接.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        }

        .top-bar .title {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar .title .iconify { color: #3b82f6; }

        .mode-indicator {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .mode-indicator.local {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .mode-indicator.server {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .main-container {
            display: flex;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }

        .config-panel {
            width: 380px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(59, 130, 246, 0.3);
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 60px);
        }

        .config-section { margin-bottom: 20px; }

        .config-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .config-row { margin-bottom: 14px; }

        .config-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .config-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.8);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .config-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .input-hint {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
        }

        .slider-container { display: flex; align-items: center; gap: 10px; }

        .slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(51, 65, 85, 0.8);
            border-radius: 3px;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            min-width: 55px;
            text-align: right;
            font-size: 13px;
            color: #22c55e;
            font-weight: 600;
        }

        .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .checkbox-item.checked {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .checkbox-item input { display: none; }

        .speed-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .speed-item {
            text-align: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 8px 4px;
            border-radius: 6px;
        }

        .speed-label { font-size: 10px; color: #64748b; margin-bottom: 4px; }

        .speed-input {
            width: 100%;
            text-align: center;
            padding: 6px 4px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 4px;
            color: #e2e8f0;
            font-size: 13px;
        }

        .run-button {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .run-button:hover { opacity: 0.9; }
        .run-button:disabled { background: #475569; cursor: not-allowed; }

        .run-button .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .preview-panel { flex: 1; position: relative; }
        #cesiumContainer { width: 100%; height: calc(100vh - 60px); }

        .result-stats {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 14px;
            z-index: 50;
            min-width: 260px;
            display: none;
        }

        .result-stats.visible { display: block; }

        .stats-title {
            font-size: 13px;
            font-weight: 600;
            color: #22c55e;
            margin-bottom: 10px;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        .stat-item { background: rgba(30, 41, 59, 0.6); padding: 10px; border-radius: 6px; }

        .stat-label { font-size: 10px; color: #64748b; margin-bottom: 2px; }

        .stat-value { font-size: 16px; font-weight: bold; }
        .stat-value.green { color: #22c55e; }
        .stat-value.yellow { color: #fbbf24; }
        .stat-value.blue { color: #60a5fa; }

        .biz-dist { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(51, 65, 85, 0.5); }

        .biz-dist-title { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }

        .biz-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

        .biz-name { width: 70px; font-size: 10px; color: #94a3b8; }

        .biz-progress { flex: 1; height: 6px; background: rgba(51, 65, 85, 0.5); border-radius: 3px; overflow: hidden; }

        .biz-fill { height: 100%; border-radius: 3px; }

        .biz-count { width: 24px; font-size: 11px; color: #e2e8f0; text-align: right; }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.visible { display: flex; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text { font-size: 13px; color: #94a3b8; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.visible { transform: translateY(0); opacity: 1; }
        .toast.success { border: 1px solid #22c55e; }
        .toast.error { border: 1px solid #ef4444; }
        .toast.success .toast-icon { color: #22c55e; }
        .toast.error .toast-icon { color: #ef4444; }
        .toast-message { font-size: 13px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="title">
            <iconify-icon icon="lucide:plane"></iconify-icon>
            <span>航线自动生成工具</span>
        </div>
        <div id="modeIndicator" class="mode-indicator local">
            <iconify-icon icon="lucide:cpu" style="font-size: 12px; margin-right: 4px;"></iconify-icon>
            本地模式
        </div>
    </div>

    <div class="main-container">
        <div class="config-panel">
            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:hash" width="14"></iconify-icon>
                    数量约束
                </div>
                <div class="config-row">
                    <div class="config-label">航线总数</div>
                    <input type="number" class="config-input" id="flightCount" value="30" min="1" max="100">
                    <div class="input-hint">建议10-50条</div>
                </div>
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:clock" width="14"></iconify-icon>
                    时间/距离约束
                </div>
                <div class="config-row">
                    <div class="config-label">最大飞行时间（分钟）</div>
                    <div class="slider-container">
                        <input type="range" class="slider" id="maxFlightTimeSlider" min="10" max="60" value="50">
                        <span class="slider-value" id="maxFlightTimeValue">50分钟</span>
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-label">最大航线长度（公里）</div>
                    <div class="slider-container">
                        <input type="range" class="slider" id="maxDistanceSlider" min="10" max="60" value="40">
                        <span class="slider-value" id="maxDistanceValue">40km</span>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:speedometer" width="14"></iconify-icon>
                    限速约束（km/h）
                </div>
                <div class="config-row">
                    <div class="speed-grid">
                        <div class="speed-item">
                            <div class="speed-label">A类</div>
                            <input type="number" class="speed-input" id="speedA" value="60">
                        </div>
                        <div class="speed-item">
                            <div class="speed-label">B类</div>
                            <input type="number" class="speed-input" id="speedB" value="75">
                        </div>
                        <div class="speed-item">
                            <div class="speed-label">C类</div>
                            <input type="number" class="speed-input" id="speedC" value="90">
                        </div>
                        <div class="speed-item">
                            <div class="speed-label">D类</div>
                            <input type="number" class="speed-input" id="speedD" value="100">
                        </div>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:briefcase" width="14"></iconify-icon>
                    业务类型（可多选）
                </div>
                <div class="checkbox-group" id="businessTypes">
                    <label class="checkbox-item checked"><input type="checkbox" checked>低空游览</label>
                    <label class="checkbox-item checked"><input type="checkbox" checked>农林作业</label>
                    <label class="checkbox-item checked"><input type="checkbox" checked>快递物流</label>
                    <label class="checkbox-item checked"><input type="checkbox" checked>医疗救护</label>
                    <label class="checkbox-item"><input type="checkbox">电力巡线</label>
                    <label class="checkbox-item"><input type="checkbox">遥感测绘</label>
                </div>
            </div>

            <button class="run-button" id="runButton" onclick="runGeneration()">
                <iconify-icon icon="lucide:play"></iconify-icon>
                <span>生成航线</span>
            </button>
        </div>

        <div class="preview-panel">
            <div id="cesiumContainer"></div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在生成航线...</div>
            </div>
            <div class="result-stats" id="resultStats">
                <div class="stats-title">
                    <iconify-icon icon="lucide:check-circle"></iconify-icon>
                    生成完成
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">航线数量</div>
                        <div class="stat-value green" id="statCount">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">覆盖航路</div>
                        <div class="stat-value blue" id="statCoverage">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">最短飞行</div>
                        <div class="stat-value" id="statMinTime">0分钟</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">最长飞行</div>
                        <div class="stat-value yellow" id="statMaxTime">0分钟</div>
                    </div>
                </div>
                <div class="biz-dist" id="bizDistribution">
                    <div class="biz-dist-title">业务类型分布</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <iconify-icon icon="lucide:check-circle" class="toast-icon"></iconify-icon>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script>
        let viewer;
        let flightEntities = [];
        let generatedFlightData = null;

        const businessColors = {
            '低空游览': '#ec4899', '农林作业': '#22c55e', '航空护林': '#10b981',
            '快递物流运输': '#f59e0b', '医疗救护': '#ef4444', '电力巡线': '#06b6d4', '遥感测绘': '#8b5cf6'
        };

        // 滑块联动
        document.getElementById('maxFlightTimeSlider').addEventListener('input', function(e) {
            document.getElementById('maxFlightTimeValue').textContent = e.target.value + '分钟';
        });
        document.getElementById('maxDistanceSlider').addEventListener('input', function(e) {
            document.getElementById('maxDistanceValue').textContent = e.target.value + 'km';
        });

        // 复选框交互
        document.querySelectorAll('.checkbox-item').forEach(item => {
            item.addEventListener('click', function() {
                this.classList.toggle('checked');
                this.querySelector('input').checked = this.classList.contains('checked');
            });
        });

        // 初始化Cesium
        function initCesium() {
            const tiandituToken = '4bac064681a9f35b4a7dc86368470e73';
            const provider = new Cesium.WebMapTileServiceImageryProvider({
                url: 'http://t0.tianditu.com/img_w/wmts?service=wmts&request=GetTile&version=1.0.0&LAYER=img&tileMatrixSet=w&TileMatrix={TileMatrix}&TileRow={TileRow}&TileCol={TileCol}&style=default&format=tiles&tk=' + tiandituToken,
                layer: 'img', style: 'default', format: 'tiles', tileMatrixSetID: 'w', maximumLevel: 18
            });

            viewer = new Cesium.Viewer('cesiumContainer', {
                imageryProvider: provider,
                terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                baseLayerPicker: false, geocoder: false, homeButton: true,
                sceneModePicker: false, navigationHelpButton: false,
                animation: false, timeline: false, fullscreenButton: true,
                infoBox: false, selectionIndicator: false
            });

            viewer.imageryLayers.removeAll();
            viewer.imageryLayers.addImageryProvider(provider);
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(119.995842, 30.382550, 80000),
                orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-45), roll: 0 }
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('.iconify');
            toast.className = 'toast ' + type + ' visible';
            toastMessage.textContent = message;
            icon.setAttribute('icon', type === 'success' ? 'lucide:check-circle' : 'lucide:x-circle');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        function clearFlights() {
            flightEntities.forEach(e => viewer.entities.remove(e));
            flightEntities = [];
        }

        function renderFlights(flights) {
            clearFlights();
            flights.forEach(flight => {
                const coords = flight['航线坐标'];
                if (!coords || coords.length < 2) return;
                const positions = [];
                for (let i = 0; i < coords.length; i++) {
                    positions.push(coords[i][0], coords[i][1], coords[i][2] + 5);
                }
                const color = businessColors[flight['业务类型']] || '#22c55e';
                const entity = viewer.entities.add({
                    polyline: {
                        positions: Cesium.Cartesian3.fromDegreesArrayHeights(positions),
                        width: 4,
                        material: Cesium.Color.fromCssColorString(color)
                    }
                });
                flightEntities.push(entity);
            });
        }

        function updateStats(flights, coverage) {
            document.getElementById('statCount').textContent = flights.length;
            const times = flights.map(f => f['预计飞行时间_min']);
            document.getElementById('statMinTime').textContent = Math.min(...times).toFixed(1) + '分钟';
            document.getElementById('statMaxTime').textContent = Math.max(...times).toFixed(1) + '分钟';
            document.getElementById('statCoverage').textContent = (coverage.length || 0) + '/96';

            const bizCounts = {};
            flights.forEach(f => {
                const t = f['业务类型'];
                bizCounts[t] = (bizCounts[t] || 0) + 1;
            });
            const maxCount = Math.max(...Object.values(bizCounts), 1);
            let html = '<div class="biz-dist-title">业务类型分布</div>';
            Object.entries(bizCounts).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                const color = businessColors[type] || '#64748b';
                const width = (count / maxCount) * 100;
                html += `<div class="biz-bar">
                    <span class="biz-name">${type}</span>
                    <div class="biz-progress"><div class="biz-fill" style="width:${width}%;background:${color};"></div></div>
                    <span class="biz-count">${count}</span>
                </div>`;
            });
            document.getElementById('bizDistribution').innerHTML = html;
            document.getElementById('resultStats').classList.add('visible');
        }

        // 本地生成算法
        function localGenerateFlights(params) {
            if (!window.routeData || window.routeData.length === 0) {
                throw new Error('航路数据未加载');
            }

            const flightCount = params.flight_count || 30;
            const maxFlightTime = params.max_flight_time || 50;
            const maxDistance = params.max_distance || 40;
            const speeds = params.speeds || {A: 60, B: 75, C: 90, D: 100};
            const selectedBiz = params.business_types || ['低空游览', '农林作业', '快递物流', '医疗救护'];

            const bizTypes = {
                '低空游览': [{code: '4.1', type: '低空游览', goal: '景区空中观光', analysis: '为游客提供独特空中观光体验'}],
                '农林作业': [{code: '1.2', type: '农林作业', goal: '农作物病虫害防治', analysis: '精准农业航空作业'}],
                '航空护林': [{code: '1.1', type: '航空护林', goal: '森林防火巡护', analysis: '利用无人机进行森林火情监测'}],
                '快递物流': [{code: '3.1', type: '快递物流运输', goal: '快递末端配送', analysis: '解决最后一公里配送难题'}],
                '医疗救护': [{code: '2.1', type: '医疗救护', goal: '急救物资转运', analysis: '为偏远地区提供快速医疗救护'}],
                '电力巡线': [{code: '2.8', type: '电力巡线', goal: '输电线路巡检', analysis: '替代人工巡线，快速发现隐患'}],
                '遥感测绘': [{code: '2.10', type: '遥感测绘', goal: '地形测绘', analysis: '快速获取高精度地形数据'}]
            };

            const poiNames = {
                '低空游览': ['莫干山旅游集散中心', '下渚湖湿地公园', '防风古国景区', '上渚山公园', '碧坞龙潭景区'],
                '农林作业': ['雷甸农业基地', '洛舍农业产业园', '乾元农业示范区', '新安农业基地', '禹越农林基地'],
                '航空护林': ['莫干山保护区', '下渚湖湿地保护区', '南山保护区'],
                '快递物流': ['德清县物流中心', '武康镇政府', '地理信息小镇', '科技创业园'],
                '医疗救护': ['中医院', '妇幼保健院', '消防救援中心', '应急物资储备库'],
                '电力巡线': ['电力调度中心', '各乡镇变电站'],
                '遥感测绘': ['德清县全域', '地理信息产业园']
            };

            // 排除LK连接线
            const airways = window.routeData.filter(r => !r['航路编号'].startsWith('LK'));
            const flights = [];
            const usedAirways = new Set();

            // 根据选中业务随机分配
            const bizPool = [];
            selectedBiz.forEach(biz => {
                const count = Math.ceil(flightCount / selectedBiz.length);
                for (let i = 0; i < count; i++) bizPool.push(biz);
            });

            for (let i = 0; i < bizPool.length && flights.length < flightCount; i++) {
                const bizName = bizPool[i];
                const availableAirways = airways.filter(a => !usedAirways.has(a['航路编号']));
                if (availableAirways.length === 0) break;

                const airway = availableAirways[Math.floor(Math.random() * availableAirways.length)];
                usedAirways.add(airway['航路编号']);

                const biz = bizTypes[bizName][0];
                const pois = poiNames[bizName];
                const poi = pois[Math.floor(Math.random() * pois.length)];

                // 解析航路坐标
                let coords = [];
                try {
                    const czml = JSON.parse(airway['CZML']);
                    const pos = czml.corridor.positions.cartographicDegrees;
                    let j = 0;
                    while (j < pos.length) {
                        if (Array.isArray(pos[j]) && pos[j].length >= 2) {
                            const h = (j + 1 < pos.length && typeof pos[j + 1] === 'number') ? pos[j + 1] : 70;
                            coords.push([pos[j][0], pos[j][1], h]);
                            j += 2;
                        } else j++;
                    }
                } catch (e) {}

                if (coords.length < 2) continue;

                // 计算距离
                let dist = 0;
                for (let k = 0; k < coords.length - 1; k++) {
                    const dx = (coords[k+1][0] - coords[k][0]) * 111000 * Math.abs(coords[k][1]);
                    const dy = (coords[k+1][1] - coords[k][1]) * 111000;
                    dist += Math.sqrt(dx*dx + dy*dy);
                }

                // 限制长度
                if (dist / 1000 > maxDistance) {
                    const targetPoints = Math.ceil(coords.length * maxDistance * 10 / (dist / 1000));
                    coords = coords.slice(0, Math.max(2, targetPoints));
                    dist = maxDistance * 1000;
                }

                const routeType = airway['航路类型'];
                const maxSpeed = speeds[routeType] || 80;
                const flightTime = (dist / 1000) / maxSpeed * 60;

                if (flightTime > maxFlightTime) continue;

                flights.push({
                    '航线ID': `FL${String(flights.length + 1).padStart(3, '0')}`,
                    '航线名称': `${biz.code}-${biz.type}`,
                    '所属航路': airway['航路编号'],
                    '航路级别': airway['航路级别'],
                    '航路类型': routeType,
                    '起点名称': poi,
                    '终点名称': pois[(pois.indexOf(poi) + 1) % pois.length],
                    '起点坐标': {lon: coords[0][0], lat: coords[0][1], height: coords[0][2]},
                    '终点坐标': {lon: coords[coords.length-1][0], lat: coords[coords.length-1][1], height: coords[coords.length-1][2]},
                    '航线距离_m': Math.round(dist),
                    '最高限速_kmh': maxSpeed,
                    '预计飞行时间_min': Math.round(flightTime * 10) / 10,
                    '业务类型': biz.type,
                    '业务目标': biz.goal,
                    '业务分析': biz.analysis,
                    '航线坐标': coords
                });
            }

            return { success: true, flights, coverage: Array.from(usedAirways) };
        }

        function getSelectedBusinessTypes() {
            const selected = [];
            document.querySelectorAll('.checkbox-item.checked input').forEach(input => {
                selected.push(input.parentElement.textContent.trim());
            });
            return selected;
        }

        async function runGeneration() {
            const runButton = document.getElementById('runButton');
            const loadingOverlay = document.getElementById('loadingOverlay');

            runButton.disabled = true;
            runButton.innerHTML = '<div class="spinner"></div><span>生成中...</span>';
            loadingOverlay.classList.add('visible');
            clearFlights();

            try {
                const params = {
                    flight_count: parseInt(document.getElementById('flightCount').value),
                    max_flight_time: parseInt(document.getElementById('maxFlightTimeSlider').value),
                    max_distance: parseInt(document.getElementById('maxDistanceSlider').value),
                    speeds: {
                        A: parseInt(document.getElementById('speedA').value),
                        B: parseInt(document.getElementById('speedB').value),
                        C: parseInt(document.getElementById('speedC').value),
                        D: parseInt(document.getElementById('speedD').value)
                    },
                    business_types: getSelectedBusinessTypes()
                };

                console.log('生成参数:', params);

                let result;
                try {
                    // 尝试调用服务器API
                    const response = await fetch('http://127.0.0.1:5500/api/generate-flights', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(params)
                    });
                    if (response.ok) {
                        result = await response.json();
                        document.getElementById('modeIndicator').className = 'mode-indicator server';
                        document.getElementById('modeIndicator').innerHTML = '<iconify-icon icon="lucide:server" style="font-size: 12px; margin-right: 4px;"></iconify-icon>服务器模式';
                    } else {
                        throw new Error('Server error');
                    }
                } catch (e) {
                    // 使用本地生成
                    console.log('使用本地生成模式');
                    result = localGenerateFlights(params);
                }

                if (result.success) {
                    generatedFlightData = result.flights;
                    renderFlights(generatedFlightData);
                    updateStats(generatedFlightData, result.coverage);
                    showToast(`成功生成 ${generatedFlightData.length} 条航线！`, 'success');
                } else {
                    throw new Error(result.message || '生成失败');
                }
            } catch (error) {
                console.error('生成失败:', error);
                showToast(error.message, 'error');
            } finally {
                runButton.disabled = false;
                runButton.innerHTML = '<iconify-icon icon="lucide:play"></iconify-icon><span>生成航线</span>';
                loadingOverlay.classList.remove('visible');
            }
        }

        window.addEventListener('DOMContentLoaded', initCesium);
    </script>
