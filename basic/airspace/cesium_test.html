<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>基础模型管理子系统 | 空域航路 (测试版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/iconify/3.1.0/iconify.min.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <script src="data/airspacedata/airspace_data.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        console.log('开始初始化...');
        
        // 检查数据
        console.log('airspaceData:', typeof airspaceData);
        
        // 创建Viewer
        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false
        });
        
        console.log('Cesium版本:', Cesium.VERSION);
        console.log('Viewer创建成功');
        
        // 定位到德清
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(119.995842, 30.382550, 50000)
        });
        
        console.log('初始化完成');
    </script>
</body>
</html>
