<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航路管理系统 - 仅显示96条航路</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #infoPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 300px;
            z-index: 1000;
        }
        #infoPanel h3 {
            margin: 0 0 10px 0;
            color: #00d4ff;
            font-size: 16px;
        }
        #infoPanel .stat {
            margin: 5px 0;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
        }
        #legend h4 {
            margin: 0 0 10px 0;
            color: #00d4ff;
        }
        #legend .item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        #legend .color-box {
            width: 20px;
            height: 12px;
            margin-right: 8px;
            border-radius: 2px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 2000;
        }
        .cesium-viewer-bottom,
        .cesium-viewer-animationContainer,
        .cesium-viewer-timelineContainer,
        .cesium-viewer-fullscreenContainer {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <div id="loading">加载中...</div>
    
    <div id="infoPanel">
        <h3>航路统计</h3>
        <div class="stat">航路总数: <span id="totalRoutes">-</span></div>
        <div class="stat">A类航路: <span id="typeA">-</span></div>
        <div class="stat">B类航路: <span id="typeB">-</span></div>
        <div class="stat">C类航路: <span id="typeC">-</span></div>
        <div class="stat">D类航路: <span id="typeD">-</span></div>
        <div class="stat">LINK航路: <span id="typeLink">-</span></div>
    </div>
    
    <div id="legend">
        <h4>航路类型颜色</h4>
        <div class="item"><div class="color-box" style="background: #00ffff;"></div>A类航路 (70m)</div>
        <div class="item"><div class="color-box" style="background: #8a2be2;"></div>B类航路 (120m)</div>
        <div class="item"><div class="color-box" style="background: #ff69b4;"></div>C类航路 (170m)</div>
        <div class="item"><div class="color-box" style="background: #ff8c00;"></div>D类航路 (220m)</div>
        <div class="item"><div class="color-box" style="background: #ffc800;"></div>连接线 (70m)</div>
    </div>

    <script>
        // Cesium Ion token (使用默认资产)
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMWZiLTQzYjYtYTQ0OS1kMWFjYmFkNjc5YzciLCJpZCI6NDAzODg2LCJpYXQiOjE3MjY1MjExODB9.ZmJQd4_M3j<encoded_password>';
        
        // 存储所有航路实体
        let routeEntities = [];
        let labelEntities = [];
        
        // 初始化Cesium
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.UrlTemplateImageryProvider({
                url: 'https://webst02.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}'
            }),
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            selectionIndicator: false,
            infoBox: false
        });
        
        // 设置初始视角到杭州区域
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(120.0, 30.3, 15000),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-45),
                roll: 0
            }
        });
        
        // 航路颜色映射
        function getRouteColor(type) {
            switch(type) {
                case 'A': return Cesium.Color.fromCssColorString('#00ffff').withAlpha(0.6);
                case 'B': return Cesium.Color.fromCssColorString('#8a2be2').withAlpha(0.6);
                case 'C': return Cesium.Color.fromCssColorString('#ff69b4').withAlpha(0.6);
                case 'D': return Cesium.Color.fromCssColorString('#ff8c00').withAlpha(0.6);
                case 'LINK': return Cesium.Color.fromCssColorString('#ffc800').withAlpha(0.8);
                default: return Cesium.Color.WHITE.withAlpha(0.6);
            }
        }
        
        // 获取航路高度
        function getRouteHeight(type) {
            switch(type) {
                case 'A': return 70;
                case 'B': return 120;
                case 'C': return 170;
                case 'D': return 220;
                case 'LINK': return 70;
                default: return 70;
            }
        }
        
        // 解析CZML坐标数据
        function parseCZMLPositions(czmlString) {
            try {
                const czml = JSON.parse(czmlString);
                const positionsArray = czml.corridor.positions.cartographicDegrees;
                const positions = [];
                
                // 数据格式: [[lon, lat], lat_repeat, height, ...]
                for (let i = 0; i < positionsArray.length; i++) {
                    const item = positionsArray[i];
                    if (Array.isArray(item)) {
                        const height = (i + 2 < positionsArray.length && typeof positionsArray[i + 2] === 'number') 
                            ? positionsArray[i + 2] : 70;
                        positions.push({
                            lon: item[0],
                            lat: item[1],
                            height: height
                        });
                        i += 2;
                    }
                }
                return positions;
            } catch (e) {
                console.error('解析CZML失败:', e);
                return [];
            }
        }
        
        // 渲染单条航路
        function renderAirway(airway, index) {
            const positions = parseCZMLPositions(airway.CZML);
            if (positions.length === 0) return;
            
            const type = airway['航路类型'];
            const color = getRouteColor(type);
            const height = getRouteHeight(type);
            const routeId = airway['航路编号'];
            const width = airway['半宽(m)'] * 2 || 60;
            
            // 构建Cesium坐标
            const cartesians = positions.map(p => 
                Cesium.Cartesian3.fromDegrees(p.lon, p.lat, p.height)
            );
            
            // 添加航路走廊实体
            const corridorEntity = viewer.entities.add({
                name: routeId,
                corridor: {
                    positions: cartesians,
                    width: width,
                    height: height,
                    extrudedHeight: height + 20,
                    material: color,
                    outline: true,
                    outlineColor: Cesium.Color.WHITE.withAlpha(0.3),
                    outlineWidth: 1,
                    zIndex: 0
                },
                properties: {
                    routeType: type,
                    routeId: routeId,
                    index: index
                }
            });
            routeEntities.push(corridorEntity);
            
            // 为每个节点添加标签
            positions.forEach((pos, nodeIndex) => {
                // 生成节点名称
                const nodeName = `${routeId}-${nodeIndex + 1}`;
                
                const labelEntity = viewer.entities.add({
                    name: nodeName,
                    position: Cesium.Cartesian3.fromDegrees(pos.lon, pos.lat, pos.height + 30),
                    label: {
                        text: nodeName,
                        font: '10px Microsoft YaHei',
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -10),
                        showBackground: true,
                        backgroundColor: new Cesium.Color(0, 0, 0, 0.6),
                        backgroundPadding: new Cesium.Cartesian2(4, 2),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        scaleByDistance: new Cesium.NearFarScalar(1000, 1.0, 5000, 0.5),
                        zIndex: 1
                    },
                    point: {
                        pixelSize: 6,
                        color: color,
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 1,
                        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        disableDepthTestDistance: Number.POSITIVE_INFINITY
                    },
                    properties: {
                        nodeName: nodeName,
                        routeId: routeId,
                        nodeIndex: nodeIndex,
                        lat: pos.lat,
                        lon: pos.lon,
                        height: pos.height
                    }
                });
                labelEntities.push(labelEntity);
            });
        }
        
        // 统计航路类型
        function countRouteTypes(routes) {
            const counts = { 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'LINK': 0 };
            routes.forEach(r => {
                const type = r['航路类型'];
                if (counts.hasOwnProperty(type)) {
                    counts[type]++;
                }
            });
            return counts;
        }
        
        // 加载航路数据
        async function loadRoutes() {
            try {
                // 加载航路数据（JSON格式）
                const response = await fetch('data/airroute/航线信息表_含CZML.json');
                const routeData = await response.json();
                
                console.log('加载了', routeData.length, '条航路');
                
                // 统计
                const counts = countRouteTypes(routeData);
                document.getElementById('totalRoutes').textContent = routeData.length;
                document.getElementById('typeA').textContent = counts['A'];
                document.getElementById('typeB').textContent = counts['B'];
                document.getElementById('typeC').textContent = counts['C'];
                document.getElementById('typeD').textContent = counts['D'];
                document.getElementById('typeLink').textContent = counts['LINK'];
                
                // 渲染所有航路
                routeData.forEach((airway, index) => {
                    renderAirway(airway, index);
                });
                
                console.log('渲染完成: 航路=', routeEntities.length, '节点标签=', labelEntities.length);
                
                // 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
                
                // 点击事件
                const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
                handler.setInputAction(function(movement) {
                    const pickedObject = viewer.scene.pick(movement.endPosition);
                    if (Cesium.defined(pickedObject) && pickedObject.id) {
                        const entity = pickedObject.id;
                        if (entity.properties && entity.properties.nodeName) {
                            document.body.style.cursor = 'pointer';
                        }
                    } else {
                        document.body.style.cursor = 'default';
                    }
                }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
                
            } catch (error) {
                console.error('加载航路数据失败:', error);
                document.getElementById('loading').textContent = '加载失败: ' + error.message;
            }
        }
        
        // 启动加载
        loadRoutes();
        
        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.key === 'l' || e.key === 'L') {
                // 切换标签显示
                labelEntities.forEach(entity => {
                    entity.label.show = !entity.label.show;
                });
                console.log('标签显示切换');
            }
            if (e.key === 'r' || e.key === 'R') {
                // 切换航路显示
                routeEntities.forEach(entity => {
                    entity.show = !entity.show;
                });
                labelEntities.forEach(entity => {
                    entity.show = !entity.show;
                });
                console.log('航路显示切换');
            }
        });
        
        // 窗口关闭提示
        window.onbeforeunload = function() {
            console.log('航路节点数量:', labelEntities.length);
        };
    </script>
</body>
</html>
