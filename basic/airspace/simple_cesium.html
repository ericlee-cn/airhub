<body class="flex flex-col is-mb-ai-setting">
<!-- 顶部导航 -->
<header class="h-16 flex items-center justify-between px-6 border-b border-slate-700 glass-panel z-50">
<div class="flex items-center gap-3">
<span class="iconify text-3xl text-blue-400" data-icon="material-symbols:airplanemode-active"></span>
<h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">低空仿真系统</h1>
</div>
<nav class="flex gap-1 h-full">
<a class="flex items-center px-4 transition-all hover:bg-slate-800">系统总览</a>
<a class="flex items-center px-4 transition-all hover:bg-slate-800"><span class="iconify mr-2" data-icon="lucide:map"></span>地理环境</a>
<a class="flex items-center px-4 transition-all hover:bg-slate-800"><span class="iconify mr-2" data-icon="lucide:waves"></span>电磁环境</a>
<a class="flex items-center px-4 transition-all hover:bg-slate-800"><span class="iconify mr-2" data-icon="lucide:cloud-sun"></span>气象环境</a>
<a class="flex items-center px-4 transition-all hover:bg-slate-800 nav-active"><span class="iconify mr-2" data-icon="lucide:layers"></span>空域航路</a>
<a class="flex items-center px-4 transition-all hover:bg-slate-800"><span class="iconify mr-2" data-icon="lucide:gavel"></span>飞行规则</a>
<a class="flex items-center px-4 transition-all hover:bg-slate-800"><span class="iconify mr-2" data-icon="lucide:database"></span>装备库</a>
</nav>
</header>

<div class="flex-1 flex overflow-hidden">
<!-- 中间：Cesium地图区域 -->
<main class="flex-1 relative map-bg overflow-hidden">
<div id="cesiumContainer"></div>
<div class="absolute bottom-6 left-6 flex items-center gap-4 z-10">
<div class="glass-panel px-4 py-2 rounded-lg text-xs font-mono border-l-4 border-emerald-500 pointer-events-none">
                    当前在线飞行器: 42 | 在途航运: 15
                </div>
</div>
</main>
</div>

<script>
        // 初始化Cesium地图
        console.log('开始初始化Cesium...');

        try {
            // 使用高德卫星影像地图
            const gaodeProvider = new Cesium.UrlTemplateImageryProvider({
                url: 'https://webst02.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
                tilingScheme: new Cesium.WebMercatorTilingScheme(),
                maximumLevel: 18,
                credit: '高德卫星影像'
            });

            console.log('高德地图Provider创建成功:', gaodeProvider);

            const viewer = new Cesium.Viewer('cesiumContainer', {
                imageryProvider: gaodeProvider,
                terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                baseLayerPicker: false,
                geocoder: false,
                homeButton: false,
                sceneModePicker: false,
                navigationHelpButton: false,
                animation: false,
                timeline: false,
                fullscreenButton: false,
                vrButton: false,
                infoBox: false,
                selectionIndicator: false,
                shadows: false,
                shouldAnimate: false
            });

            console.log('Viewer创建成功');

            // 监听影像图层加载事件
            viewer.imageryLayers.removeAll();
            const imageryLayer = viewer.imageryLayers.addImageryProvider(gaodeProvider);

            console.log('ImageryLayer添加成功, 图层数:', viewer.imageryLayers.length);

            // 监听瓦片加载
            viewer.scene.globe.tileLoadProgressEvent.addEventListener(function(numberOfPendingRequests, numberOfTilesProcessing) {
                console.log('瓦片加载状态 - 待加载:', numberOfPendingRequests, '处理中:', numberOfTilesProcessing);
            });

            // 监听错误
            viewer.imageryLayers.layerCollection.layerAdded.addEventListener(function(layer, index) {
                console.log('图层已添加:', layer);
            });

            // 定位到德清县
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(119.9788, 30.5335, 50000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-45),
                    roll: 0
                }
            });

            console.log('初始化完成,定位到德清县');

            // 5秒后检查加载状态
            setTimeout(() => {
                console.log('5秒后检查:');
                console.log('- 场景状态:', viewer.scene.mode);
                console.log('- 图层数量:', viewer.imageryLayers.length);
                console.log('- 相机高度:', viewer.camera.positionCartographic.height);
                console.log('- 当前影像提供器:', viewer.imageryLayers.get(0).imageryProvider);
            }, 5000);

        } catch (error) {
            console.error('错误:', error);
            alert('Cesium初始化失败: ' + error.message);
        }
    </script>
</body>
