<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Cesium OpenStreetMap测试</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        console.log('开始初始化Cesium OpenStreetMap...');

        try {
            // 创建viewer
            const viewer = new Cesium.Viewer('cesiumContainer', {
                // OpenStreetMap底图
                imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://tile.openstreetmap.org/'
                }),
                terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                baseLayerPicker: false,
                geocoder: false,
                homeButton: true,
                sceneModePicker: true,
                navigationHelpButton: false,
                animation: false,
                timeline: false,
                fullscreenButton: true,
                vrButton: false,
                infoBox: false,
                selectionIndicator: false,
                shadows: false,
                shouldAnimate: false
            });

            console.log('Viewer创建成功');

            // 设置背景
            viewer.scene.backgroundColor = Cesium.Color.BLUE;

            // 定位到德清县
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(119.9788, 30.5335, 100000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-45),
                    roll: 0
                }
            });

            console.log('相机定位完成');

            // 添加德清县标记
            viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(119.9788, 30.5335),
                point: {
                    pixelSize: 10,
                    color: Cesium.Color.YELLOW
                },
                label: {
                    text: '德清县',
                    font: '14pt sans-serif',
                    fillColor: Cesium.Color.WHITE,
                    outlineColor: Cesium.Color.BLACK,
                    outlineWidth: 2,
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -20)
                }
            });

            console.log('标记添加完成');

        } catch (error) {
            console.error('错误:', error);
            alert('初始化失败: ' + error.message);
        }
    </script>
</body>
</html>
