<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>调试页面</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            z-index: 100;
            font-family: monospace;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="info">正在初始化...</div>
    <div id="cesiumContainer"></div>
    <script>
        const info = document.getElementById('info');

        function log(msg) {
            info.innerHTML += '<br>' + msg;
            console.log(msg);
        }

        log('1. 开始加载Cesium...');
        log('Cesium版本: ' + Cesium.VERSION);

        setTimeout(function() {
            try {
                log('2. 创建Viewer...');

                // 使用Cesium默认的Ion地图
                const viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                    baseLayerPicker: false,
                    geocoder: false,
                    homeButton: true,
                    sceneModePicker: true,
                    navigationHelpButton: false,
                    animation: false,
                    timeline: false,
                    fullscreenButton: true,
                    vrButton: false,
                    infoBox: false,
                    selectionIndicator: false,
                    shadows: false,
                    shouldAnimate: false
                });

                log('3. Viewer创建成功');
                log('4. 当前底图图层: ' + viewer.imageryLayers.length);

                // 尝试添加OSM
                log('5. 尝试添加OpenStreetMap...');
                const osmProvider = new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://tile.openstreetmap.org/'
                });
                log('   OSM Provider创建成功');

                const osmLayer = viewer.imageryLayers.addImageryProvider(osmProvider);
                log('6. OSM图层添加成功,总图层数: ' + viewer.imageryLayers.length);

                // 设置相机
                log('7. 设置相机位置...');
                viewer.camera.setView({
                    destination: Cesium.Cartesian3.fromDegrees(119.9788, 30.5335, 100000),
                    orientation: {
                        heading: Cesium.Math.toRadians(0),
                        pitch: Cesium.Math.toRadians(-45),
                        roll: 0
                    }
                });

                log('8. 初始化完成!');
                log('9. 按F12查看详细错误信息');

            } catch (error) {
                log('错误: ' + error.message);
                console.error(error);
            }
        }, 1000);
    </script>
</body>
</html>
