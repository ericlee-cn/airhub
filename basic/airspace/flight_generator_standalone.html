<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航线自动生成工具</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        }

        .top-bar .title { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 12px; }
        .top-bar .title .iconify { color: #3b82f6; }

        .mode-indicator { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .mode-indicator.local { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }

        .main-container { display: flex; margin-top: 60px; min-height: calc(100vh - 60px); }

        .config-panel {
            width: 380px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(59, 130, 246, 0.3);
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 60px);
        }

        .config-section { margin-bottom: 20px; }
        .config-section-title {
            font-size: 13px; font-weight: 600; color: #60a5fa; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; padding-bottom: 8px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .config-row { margin-bottom: 14px; }
        .config-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }

        .config-input {
            width: 100%; padding: 10px 12px; background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.8); border-radius: 8px;
            color: #e2e8f0; font-size: 14px;
        }
        .config-input:focus { outline: none; border-color: #3b82f6; }
        .input-hint { font-size: 10px; color: #64748b; margin-top: 4px; }

        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider {
            flex: 1; -webkit-appearance: none; height: 6px;
            background: rgba(51, 65, 85, 0.8); border-radius: 3px;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: #3b82f6; border-radius: 50%; cursor: pointer;
        }
        .slider-value { min-width: 55px; text-align: right; font-size: 13px; color: #22c55e; font-weight: 600; }

        .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .checkbox-item {
            display: flex; align-items: center; gap: 6px; padding: 8px 10px;
            background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .checkbox-item.checked { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); }
        .checkbox-item input { display: none; }

        .speed-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
        .speed-item { text-align: center; background: rgba(30, 41, 59, 0.4); padding: 8px 4px; border-radius: 6px; }
        .speed-label { font-size: 10px; color: #64748b; margin-bottom: 4px; }
        .speed-input {
            width: 100%; text-align: center; padding: 6px 4px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 4px; color: #e2e8f0; font-size: 13px;
        }

        .run-button {
            width: 100%; padding: 12px 20px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-top: 20px;
        }
        .run-button:hover { opacity: 0.9; }
        .run-button:disabled { background: #475569; cursor: not-allowed; }
        .run-button .spinner {
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .preview-panel { flex: 1; position: relative; }
        #cesiumContainer { width: 100%; height: calc(100vh - 60px); }

        .result-stats {
            position: absolute; top: 16px; left: 16px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 14px; z-index: 50; min-width: 260px; display: none;
        }
        .result-stats.visible { display: block; }
        .stats-title { font-size: 13px; font-weight: 600; color: #22c55e; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .stat-item { background: rgba(30, 41, 59, 0.6); padding: 10px; border-radius: 6px; }
        .stat-label { font-size: 10px; color: #64748b; margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: bold; }
        .stat-value.green { color: #22c55e; }
        .stat-value.yellow { color: #fbbf24; }
        .stat-value.blue { color: #60a5fa; }

        .biz-dist { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(51, 65, 85, 0.5); }
        .biz-dist-title { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
        .biz-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .biz-name { width: 70px; font-size: 10px; color: #94a3b8; }
        .biz-progress { flex: 1; height: 6px; background: rgba(51, 65, 85, 0.5); border-radius: 3px; overflow: hidden; }
        .biz-fill { height: 100%; border-radius: 3px; }
        .biz-count { width: 24px; font-size: 11px; color: #e2e8f0; text-align: right; }

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9); display: none;
            align-items: center; justify-content: center; z-index: 100;
            flex-direction: column; gap: 12px;
        }
        .loading-overlay.visible { display: flex; }
        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .loading-text { font-size: 13px; color: #94a3b8; }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: rgba(15, 23, 42, 0.95); border-radius: 10px;
            padding: 14px 20px; display: flex; align-items: center; gap: 10px;
            z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s;
        }
        .toast.visible { transform: translateY(0); opacity: 1; }
        .toast.success { border: 1px solid #22c55e; }
        .toast.error { border: 1px solid #ef4444; }
        .toast.success .toast-icon { color: #22c55e; }
        .toast.error .toast-icon { color: #ef4444; }
        .toast-message { font-size: 13px; }

        .data-load-hint {
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: #94a3b8;
        }
        .data-load-hint strong { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="title">
            <iconify-icon icon="lucide:plane"></iconify-icon>
            <span>航线自动生成工具</span>
        </div>
        <div class="mode-indicator local">
            <iconify-icon icon="lucide:cpu" style="font-size: 12px; margin-right: 4px;"></iconify-icon>
            本地模式
        </div>
    </div>

    <div class="main-container">
        <div class="config-panel">
            <div class="data-load-hint">
                <strong>提示：</strong>使用内置测试航路数据。如需使用完整数据，请在 VS Code 中用 Live Server 打开。
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:hash" width="14"></iconify-icon>
                    数量约束
                </div>
                <div class="config-row">
                    <div class="config-label">航线总数</div>
                    <input type="number" class="config-input" id="flightCount" value="10" min="1" max="50">
                    <div class="input-hint">建议10-30条（测试数据有限）</div>
                </div>
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:clock" width="14"></iconify-icon>
                    时间/距离约束
                </div>
                <div class="config-row">
                    <div class="config-label">最大飞行时间（分钟）</div>
                    <div class="slider-container">
                        <input type="range" class="slider" id="maxFlightTimeSlider" min="10" max="60" value="50">
                        <span class="slider-value" id="maxFlightTimeValue">50分钟</span>
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-label">最大航线长度（公里）</div>
                    <div class="slider-container">
                        <input type="range" class="slider" id="maxDistanceSlider" min="10" max="60" value="40">
                        <span class="slider-value" id="maxDistanceValue">40km</span>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:speedometer" width="14"></iconify-icon>
                    限速约束（km/h）
                </div>
                <div class="config-row">
                    <div class="speed-grid">
                        <div class="speed-item">
                            <div class="speed-label">A类</div>
                            <input type="number" class="speed-input" id="speedA" value="60">
                        </div>
                        <div class="speed-item">
                            <div class="speed-label">B类</div>
                            <input type="number" class="speed-input" id="speedB" value="75">
                        </div>
                        <div class="speed-item">
                            <div class="speed-label">C类</div>
                            <input type="number" class="speed-input" id="speedC" value="90">
                        </div>
                        <div class="speed-item">
                            <div class="speed-label">D类</div>
                            <input type="number" class="speed-input" id="speedD" value="100">
                        </div>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <div class="config-section-title">
                    <iconify-icon icon="lucide:briefcase" width="14"></iconify-icon>
                    业务类型（可多选）
                </div>
                <div class="checkbox-group" id="businessTypes">
                    <label class="checkbox-item checked"><input type="checkbox" checked>低空游览</label>
                    <label class="checkbox-item checked"><input type="checkbox" checked>农林作业</label>
                    <label class="checkbox-item checked"><input type="checkbox" checked>快递物流</label>
                    <label class="checkbox-item"><input type="checkbox">医疗救护</label>
                    <label class="checkbox-item"><input type="checkbox">电力巡线</label>
                    <label class="checkbox-item"><input type="checkbox">遥感测绘</label>
                </div>
            </div>

            <button class="run-button" id="runButton" onclick="runGeneration()">
                <iconify-icon icon="lucide:play"></iconify-icon>
                <span>生成航线</span>
            </button>
        </div>

        <div class="preview-panel">
            <div id="cesiumContainer"></div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在生成航线...</div>
            </div>
            <div class="result-stats" id="resultStats">
                <div class="stats-title">
                    <iconify-icon icon="lucide:check-circle"></iconify-icon>
                    生成完成
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">航线数量</div>
                        <div class="stat-value green" id="statCount">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">覆盖航路</div>
                        <div class="stat-value blue" id="statCoverage">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">最短飞行</div>
                        <div class="stat-value" id="statMinTime">0分钟</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">最长飞行</div>
                        <div class="stat-value yellow" id="statMaxTime">0分钟</div>
                    </div>
                </div>
                <div class="biz-dist" id="bizDistribution">
                    <div class="biz-dist-title">业务类型分布</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <iconify-icon icon="lucide:check-circle" class="toast-icon"></iconify-icon>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script>
        let viewer;
        let flightEntities = [];
        let generatedFlightData = null;

        const businessColors = {
            '低空游览': '#ec4899', '农林作业': '#22c55e', '航空护林': '#10b981',
            '快递物流运输': '#f59e0b', '医疗救护': '#ef4444', '电力巡线': '#06b6d4', '遥感测绘': '#8b5cf6'
        };

        // 备用测试航路数据（当外部文件加载失败时使用）
        const testRouteData = [
            { "航路编号": "AA1001", "航路类型": "A", "航路级别": "Ⅲ", "高度": 70,
              "coords": [[120.04047499, 30.54888035], [120.03787868, 30.5493682], [120.03646517, 30.55320013], [120.03512665, 30.55445816], [120.04090013, 30.554718], [120.04399074, 30.5551184]] },
            { "航路编号": "AA1002", "航路类型": "A", "航路级别": "Ⅲ", "高度": 70,
              "coords": [[120.03909147, 30.5563793], [120.03578531, 30.55547423], [120.03179866, 30.55403098], [120.03179305, 30.55127907], [120.03680352, 30.54934923]] },
            { "航路编号": "BA1001", "航路类型": "B", "航路级别": "Ⅲ", "高度": 120,
              "coords": [[119.96617517, 30.52185285], [119.96504692, 30.52694397], [119.96417668, 30.5320355], [119.96390029, 30.53661519], [119.96134764, 30.53720545]] },
            { "航路编号": "BA1002", "航路类型": "B", "航路级别": "Ⅲ", "高度": 120,
              "coords": [[119.96376322, 30.53632831], [119.96198415, 30.53364806], [119.96274683, 30.52846385], [119.96303657, 30.52285766], [119.96345571, 30.52226235]] },
            { "航路编号": "CA1001", "航路类型": "C", "航路级别": "Ⅲ", "高度": 170,
              "coords": [[119.96746419, 30.51049336], [119.96462636, 30.51080081], [119.96296051, 30.51300661], [119.95886043, 30.51414836], [119.95834475, 30.51594086]] },
            { "航路编号": "CA1002", "航路类型": "C", "航路级别": "Ⅲ", "高度": 170,
              "coords": [[119.98703996, 30.51218299], [119.98163031, 30.51171448], [119.97849556, 30.51138215], [119.97492597, 30.5156486], [119.97722165, 30.51546526]] },
            { "航路编号": "DA1001", "航路类型": "D", "航路级别": "Ⅲ", "高度": 220,
              "coords": [[119.95812445, 30.51595425], [119.95848458, 30.51749902], [119.96146156, 30.51774609], [119.96470739, 30.51568274], [119.96590036, 30.51346205]] },
            { "航路编号": "DA1002", "航路类型": "D", "航路级别": "Ⅲ", "高度": 220,
              "coords": [[119.96835132, 30.51343112], [119.97064632, 30.51022401], [119.97679649, 30.51039744], [119.98032354, 30.5098154], [119.97849556, 30.51138215]] },
            { "航路编号": "AA1003", "航路类型": "A", "航路级别": "Ⅲ", "高度": 70,
              "coords": [[120.05605341, 30.54696565], [120.05139529, 30.54680798], [120.0474351, 30.54845353], [120.04275936, 30.54847935], [120.04015243, 30.54840354]] },
            { "航路编号": "BA1003", "航路类型": "B", "航路级别": "Ⅲ", "高度": 120,
              "coords": [[120.05667633, 30.54422175], [120.05565605, 30.54915537], [120.05443664, 30.55058085], [120.0571711, 30.5506095], [120.05817007, 30.54840247]] },
            { "航路编号": "CA1003", "航路类型": "C", "航路级别": "Ⅱ", "高度": 170,
              "coords": [[120.03839467, 30.54860239], [120.04297955, 30.54638871], [120.04558585, 30.5421455], [120.0497022, 30.5411752], [120.05671895, 30.53997918]] },
            { "航路编号": "DA1003", "航路类型": "D", "航路级别": "Ⅱ", "高度": 220,
              "coords": [[119.95651769, 30.51322333], [119.95966082, 30.51106668], [119.96352462, 30.51084904], [119.96590036, 30.51346205], [119.96746419, 30.51049336]] },
        ];

        // 解析CZML格式的坐标数据
        function parseCZMLCoords(czmlString) {
            try {
                const czml = JSON.parse(czmlString);
                const pos = czml.corridor.positions.cartographicDegrees;
                const coords = [];
                let j = 0;
                while (j < pos.length) {
                    if (Array.isArray(pos[j]) && pos[j].length >= 2) {
                        coords.push([pos[j][0], pos[j][1]]);
                        j++;
                    } else if (typeof pos[j] === 'number' && typeof pos[j+1] === 'number') {
                        coords.push([pos[j], pos[j+1]]);
                        j += 2;
                    } else {
                        j++;
                    }
                }
                return coords;
            } catch (e) {
                console.error('CZML解析失败:', e);
                return [];
            }
        }

        // 加载外部航路数据
        async function loadRouteData() {
            try {
                const response = await fetch('data/airline/航线信息表_含CZML_最小连接.js');
                if (!response.ok) throw new Error('数据文件加载失败');
                
                const text = await response.text();
                
                // 提取JSON数组部分
                const jsonMatch = text.match(/window\.routeData\s*=\s*(\[[\s\S]*\]);?$/);
                if (jsonMatch) {
                    // 解析外部数据
                    const rawData = JSON.parse(jsonMatch[1]);
                    
                    // 转换数据格式
                    const routeData = rawData
                        .filter(item => !item['航路编号'].startsWith('LK')) // 排除连接线
                        .map(item => {
                            const coords = item['CZML'] ? parseCZMLCoords(item['CZML']) : [];
                            return {
                                '航路编号': item['航路编号'],
                                '航路类型': item['航路类型'],
                                '航路级别': item['航路级别'] || 'Ⅲ',
                                '高度': item['高度'] || 100,
                                'coords': coords
                            };
                        })
                        .filter(item => item.coords.length >= 2);
                    
                    console.log(`成功加载 ${routeData.length} 条航路数据`);
                    return routeData;
                }
            } catch (e) {
                console.warn('加载外部数据失败，使用测试数据:', e);
            }
            return testRouteData;
        }

        // 页面加载时初始化数据
        window.routeData = testRouteData; // 先使用测试数据
        loadRouteData().then(data => {
            window.routeData = data;
            console.log('航路数据已就绪，共', data.length, '条');
        });

        // 滑块联动
        document.getElementById('maxFlightTimeSlider').addEventListener('input', function(e) {
            document.getElementById('maxFlightTimeValue').textContent = e.target.value + '分钟';
        });
        document.getElementById('maxDistanceSlider').addEventListener('input', function(e) {
            document.getElementById('maxDistanceValue').textContent = e.target.value + 'km';
        });

        // 复选框交互
        document.querySelectorAll('.checkbox-item').forEach(item => {
            item.addEventListener('click', function() {
                this.classList.toggle('checked');
                this.querySelector('input').checked = this.classList.contains('checked');
            });
        });

        // 初始化Cesium
        function initCesium() {
            // 使用高德卫星影像（无需token）
            const provider = new Cesium.UrlTemplateImageryProvider({
                url: 'https://webst02.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
                minimumLevel: 3,
                maximumLevel: 18
            });

            viewer = new Cesium.Viewer('cesiumContainer', {
                imageryProvider: provider,
                terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                baseLayerPicker: false, geocoder: false, homeButton: true,
                sceneModePicker: false, navigationHelpButton: false,
                animation: false, timeline: false, fullscreenButton: true,
                infoBox: false, selectionIndicator: false
            });

            viewer.imageryLayers.removeAll();
            viewer.imageryLayers.addImageryProvider(provider);
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(120.0, 30.52, 60000),
                orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-45), roll: 0 }
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('.toast-icon');
            toast.className = 'toast ' + type + ' visible';
            toastMessage.textContent = message;
            if (icon) {
                icon.setAttribute('icon', type === 'success' ? 'lucide:check-circle' : 'lucide:x-circle');
            }
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        function clearFlights() {
            flightEntities.forEach(e => viewer.entities.remove(e));
            flightEntities = [];
        }

        function renderFlights(flights) {
            clearFlights();
            flights.forEach(flight => {
                const coords = flight['航线坐标'];
                if (!coords || coords.length < 2) return;
                const positions = [];
                for (let i = 0; i < coords.length; i++) {
                    positions.push(coords[i][0], coords[i][1], coords[i][2] || 100);
                }
                const color = businessColors[flight['业务类型']] || '#22c55e';
                const entity = viewer.entities.add({
                    polyline: {
                        positions: Cesium.Cartesian3.fromDegreesArrayHeights(positions),
                        width: 4,
                        material: Cesium.Color.fromCssColorString(color)
                    }
                });
                flightEntities.push(entity);
            });
        }

        function updateStats(flights, coverage) {
            document.getElementById('statCount').textContent = flights.length;
            const times = flights.map(f => f['预计飞行时间_min']);
            if (times.length > 0) {
                document.getElementById('statMinTime').textContent = Math.min(...times).toFixed(1) + '分钟';
                document.getElementById('statMaxTime').textContent = Math.max(...times).toFixed(1) + '分钟';
            }
            document.getElementById('statCoverage').textContent = (coverage.length || 0) + '/12';

            const bizCounts = {};
            flights.forEach(f => {
                const t = f['业务类型'];
                bizCounts[t] = (bizCounts[t] || 0) + 1;
            });
            const maxCount = Math.max(...Object.values(bizCounts), 1);
            let html = '<div class="biz-dist-title">业务类型分布</div>';
            Object.entries(bizCounts).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                const color = businessColors[type] || '#64748b';
                const width = (count / maxCount) * 100;
                html += `<div class="biz-bar">
                    <span class="biz-name">${type}</span>
                    <div class="biz-progress"><div class="biz-fill" style="width:${width}%;background:${color};"></div></div>
                    <span class="biz-count">${count}</span>
                </div>`;
            });
            document.getElementById('bizDistribution').innerHTML = html;
            document.getElementById('resultStats').classList.add('visible');
        }

        // Haversine距离计算
        function haversineDistance(coord1, coord2) {
            const R = 6371000; // 地球半径（米）
            const lat1 = coord1[1] * Math.PI / 180;
            const lat2 = coord2[1] * Math.PI / 180;
            const dLat = (coord2[1] - coord1[1]) * Math.PI / 180;
            const dLon = (coord2[0] - coord1[0]) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 本地生成算法
        function localGenerateFlights(params) {
            if (!window.routeData || window.routeData.length === 0) {
                throw new Error('航路数据未加载');
            }

            const flightCount = params.flight_count || 10;
            const maxFlightTime = params.max_flight_time || 50;
            const maxDistance = params.max_distance || 40;
            const speeds = params.speeds || {A: 60, B: 75, C: 90, D: 100};
            const selectedBiz = params.business_types || ['低空游览', '农林作业', '快递物流'];

            const bizTypes = {
                '低空游览': {code: '4.1', type: '低空游览', goal: '景区空中观光'},
                '农林作业': {code: '1.2', type: '农林作业', goal: '农作物病虫害防治'},
                '航空护林': {code: '1.1', type: '航空护林', goal: '森林防火巡护'},
                '快递物流': {code: '3.1', type: '快递物流运输', goal: '快递末端配送'},
                '医疗救护': {code: '2.1', type: '医疗救护', goal: '急救物资转运'},
                '电力巡线': {code: '2.8', type: '电力巡线', goal: '输电线路巡检'},
                '遥感测绘': {code: '2.10', type: '遥感测绘', goal: '地形测绘'}
            };

            const poiNames = {
                '低空游览': ['莫干山旅游集散中心', '下渚湖湿地公园', '防风古国景区'],
                '农林作业': ['雷甸农业基地', '洛舍农业产业园', '乾元农业示范区'],
                '航空护林': ['莫干山保护区', '下渚湖湿地保护区'],
                '快递物流': ['德清县物流中心', '地理信息小镇'],
                '医疗救护': ['中医院', '消防救援中心'],
                '电力巡线': ['电力调度中心', '变电站'],
                '遥感测绘': ['德清县全域', '地理信息产业园']
            };

            const flights = [];
            const usedAirways = new Set();

            // 循环生成航线
            let attempts = 0;
            while (flights.length < flightCount && attempts < flightCount * 3) {
                attempts++;
                
                const route = window.routeData[Math.floor(Math.random() * window.routeData.length)];
                if (usedAirways.has(route['航路编号'])) continue;
                usedAirways.add(route['航路编号']);

                const bizName = selectedBiz[Math.floor(Math.random() * selectedBiz.length)];
                const biz = bizTypes[bizName];
                const pois = poiNames[bizName];

                // 计算路线总长度
                let totalDist = 0;
                for (let i = 0; i < route.coords.length - 1; i++) {
                    totalDist += haversineDistance(route.coords[i], route.coords[i+1]);
                }

                // 限制长度
                let coords = [...route.coords];
                if (totalDist / 1000 > maxDistance) {
                    const ratio = maxDistance * 1000 / totalDist;
                    const keepCount = Math.max(2, Math.ceil(route.coords.length * ratio));
                    coords = coords.slice(0, keepCount);
                    totalDist = maxDistance * 1000;
                }

                const routeType = route['航路类型'];
                const maxSpeed = speeds[routeType] || 80;
                const flightTime = (totalDist / 1000) / maxSpeed * 60;

                if (flightTime > maxFlightTime) continue;

                flights.push({
                    '航线ID': `FL${String(flights.length + 1).padStart(3, '0')}`,
                    '航线名称': `${biz.code}-${biz.type}`,
                    '所属航路': route['航路编号'],
                    '航路级别': route['航路级别'],
                    '航路类型': routeType,
                    '起点名称': pois[Math.floor(Math.random() * pois.length)],
                    '终点名称': pois[Math.floor(Math.random() * pois.length)],
                    '航线距离_m': Math.round(totalDist),
                    '最高限速_kmh': maxSpeed,
                    '预计飞行时间_min': Math.round(flightTime * 10) / 10,
                    '业务类型': biz.type,
                    '业务目标': biz.goal,
                    '航线坐标': coords.map(c => [c[0], c[1], route['高度'] || 100])
                });
            }

            return { success: true, flights, coverage: Array.from(usedAirways) };
        }

        function getSelectedBusinessTypes() {
            const selected = [];
            document.querySelectorAll('.checkbox-item.checked input').forEach(input => {
                selected.push(input.parentElement.textContent.trim());
            });
            return selected;
        }

        async function runGeneration() {
            const runButton = document.getElementById('runButton');
            const loadingOverlay = document.getElementById('loadingOverlay');

            runButton.disabled = true;
            runButton.innerHTML = '<div class="spinner"></div><span>生成中...</span>';
            loadingOverlay.classList.add('visible');
            clearFlights();

            try {
                const params = {
                    flight_count: parseInt(document.getElementById('flightCount').value),
                    max_flight_time: parseInt(document.getElementById('maxFlightTimeSlider').value),
                    max_distance: parseInt(document.getElementById('maxDistanceSlider').value),
                    speeds: {
                        A: parseInt(document.getElementById('speedA').value),
                        B: parseInt(document.getElementById('speedB').value),
                        C: parseInt(document.getElementById('speedC').value),
                        D: parseInt(document.getElementById('speedD').value)
                    },
                    business_types: getSelectedBusinessTypes()
                };

                console.log('生成参数:', params);
                const result = localGenerateFlights(params);

                if (result.success) {
                    generatedFlightData = result.flights;
                    renderFlights(generatedFlightData);
                    updateStats(generatedFlightData, result.coverage);
                    showToast(`成功生成 ${generatedFlightData.length} 条航线！`, 'success');
                } else {
                    throw new Error(result.message || '生成失败');
                }
            } catch (error) {
                console.error('生成失败:', error);
                showToast(error.message, 'error');
            } finally {
                runButton.disabled = false;
                runButton.innerHTML = '<iconify-icon icon="lucide:play"></iconify-icon><span>生成航线</span>';
                loadingOverlay.classList.remove('visible');
            }
        }

        window.addEventListener('DOMContentLoaded', initCesium);
    </script>
