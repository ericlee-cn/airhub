<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航线与航路综合展示</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
        <script src="data/airroute/航线信息表_含CZML_连通.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #cesiumContainer { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        /* 顶部导航栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .title {
            font-size: 20px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .title .iconify {
            font-size: 24px;
            color: #3b82f6;
        }
        
        /* 图层控制面板 */
        .layer-control {
            position: absolute;
            top: 70px;
            left: 16px;
            width: 280px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            z-index: 50;
        }
        
        .layer-header {
            padding: 16px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .layer-title {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: bold;
        }
        
        .layer-list {
            padding: 16px;
        }
        
        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
        }
        
        .layer-item:last-child {
            border-bottom: none;
        }
        
        .layer-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .layer-name {
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
        }
        
        .layer-count {
            color: #94a3b8;
            font-size: 12px;
            background: rgba(51, 65, 85, 0.5);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .layer-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: rgba(51, 65, 85, 0.8);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .layer-toggle.active {
            background: rgba(59, 130, 246, 0.8);
        }
        
        .toggle-dot {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #cbd5e1;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .layer-toggle.active .toggle-dot {
            left: 22px;
            background: #60a5fa;
        }
        
        .legend-panel {
            position: absolute;
            bottom: 20px;
            left: 306px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 16px;
            z-index: 50;
            border: 1px solid rgba(59, 130, 246, 0.3);
            max-width: 320px;
        }
        
        .legend-title {
            font-size: 14px;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }
        
        .legend-color {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }
        
        /* 固定航线图例 */
        .legend-fixed-route-Ⅰ { background: #ef4444; }
        .legend-fixed-route-Ⅱ { background: #f59e0b; }
        .legend-fixed-route-Ⅲ { background: #10b981; }
        
        /* 航路图例 - 按航路类型 */
        .legend-airway-A { background: #06b6d4; }
        .legend-airway-B { background: #8b5cf6; }
        .legend-airway-C { background: #ec4899; }
        .legend-airway-D { background: #f59e0b; }

        /* 航线图例 */
        .legend-flight { background: #10b981; }
        .legend-flight-point { background: #10b981; width: 8px; height: 8px; border-radius: 50%; }

        /* 左侧资源树 - 航线分类 */
        .flight-tree {
            padding: 16px;
            border-top: 1px solid rgba(51, 65, 85, 0.5);
            max-height: 400px;
            overflow-y: auto;
        }

        .flight-category {
            margin-bottom: 12px;
        }

        .flight-category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            cursor: pointer;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .flight-category-header:hover {
            color: #e2e8f0;
        }

        .flight-category-header .iconify {
            transition: transform 0.2s;
        }

        .flight-category-header.collapsed .iconify {
            transform: rotate(-90deg);
        }

        .flight-category-items {
            padding-left: 16px;
        }

        .flight-category-items.hidden {
            display: none;
        }

        .flight-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            margin: 4px 0;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .flight-item:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .flight-item.selected {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }

        .flight-item-color {
            width: 4px;
            height: 24px;
            border-radius: 2px;
            margin-right: 10px;
            background: #22c55e;
        }

        .flight-item-info {
            flex: 1;
            min-width: 0;
        }

        .flight-item-name {
            color: #e2e8f0;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .flight-item-route {
            color: #64748b;
            font-size: 11px;
            margin-top: 2px;
        }

        /* 右侧详情面板 */
        .detail-panel {
            position: absolute;
            top: 70px;
            right: 16px;
            width: 360px;
            max-height: calc(100vh - 200px);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            z-index: 50;
            display: none;
            overflow: hidden;
        }

        .detail-panel.visible {
            display: block;
        }

        .detail-header {
            padding: 16px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .detail-title {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .detail-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .detail-content {
            padding: 16px;
            overflow-y: auto;
            max-height: calc(100vh - 300px);
        }

        .detail-section {
            margin-bottom: 16px;
        }

        .detail-section-title {
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #94a3b8;
            font-size: 13px;
        }

        .detail-value {
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
        }

        .detail-value.highlight {
            color: #22c55e;
        }

        .detail-business {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        .detail-business-type {
            color: #22c55e;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detail-business-goal {
            color: #e2e8f0;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .detail-business-analysis {
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.5;
        }

        .detail-coordinates {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .coord-badge {
            background: rgba(59, 130, 246, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #60a5fa;
        }

        /* 测量工具栏 */
        .measure-toolbar {
            position: absolute;
            bottom: 20px;
            right: 16px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            z-index: 55;
            overflow: hidden;
            min-width: 160px;
        }

        .measure-toolbar .toolbar-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 600;
        }

        .measure-tools {
            padding: 8px;
            display: flex;
            gap: 4px;
        }

        .measure-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .measure-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #e2e8f0;
            border-color: rgba(59, 130, 246, 0.3);
        }

        .measure-btn.active {
            background: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.5);
        }

        .measure-result {
            padding: 12px 16px;
            border-top: 1px solid rgba(51, 65, 85, 0.5);
            display: none;
        }

        .measure-result.visible {
            display: block;
        }

        .measure-result-label {
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .measure-result-value {
            color: #22c55e;
            font-size: 18px;
            font-weight: bold;
        }

        .measure-clear-btn {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .measure-clear-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .measure-instructions {
            padding: 8px 12px;
            font-size: 11px;
            color: #64748b;
            line-height: 1.5;
        }

        .measure-hint {
            position: absolute;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 13px;
            z-index: 1000;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <!-- 顶部导航栏 -->
    <div class="top-bar">
        <div class="title">
            <iconify-icon icon="lucide:map"></iconify-icon>
            <span>航线与航路综合展示</span>
        </div>
        <div style="color: #94a3b8; font-size: 14px;">
            Cesium 3D 地图可视化
        </div>
    </div>
    
    <!-- 图层控制面板 -->
    <div class="layer-control">
        <div class="layer-header">
            <iconify-icon icon="lucide:layers"></iconify-icon>
            <span class="layer-title">图层控制</span>
        </div>
        <div class="layer-list">
            <!-- 固定航线图层 -->
            <div class="layer-item">
                <div class="layer-info">
                    <span class="layer-name">固定航线</span>
                    <span class="layer-count">20条</span>
                </div>
                <div class="layer-toggle active" id="toggleFixedRoutes" onclick="toggleLayer('fixedRoutes')">
                    <div class="toggle-dot"></div>
                </div>
            </div>
            
            <!-- 航路图层 -->
            <div class="layer-item">
                <div class="layer-info">
                    <span class="layer-name">航路</span>
                    <span class="layer-count" id="airwayCount">加载中...</span>
                </div>
                <div class="layer-toggle active" id="toggleAirways" onclick="toggleLayer('airways')">
                    <div class="toggle-dot"></div>
                </div>
            </div>

            <!-- 连接线图层 -->
            <div class="layer-item">
                <div class="layer-info">
                    <span class="layer-name" style="color: #eab308;">连接线</span>
                    <span class="layer-count" id="linkCount">-</span>
                </div>
                <div class="layer-toggle active" id="toggleLinks" onclick="toggleLayer('links')">
                    <div class="toggle-dot"></div>
                </div>
            </div>
        </div>

        <!-- 航线资源树 -->
        <div class="flight-tree" id="flightTree">
            <div style="color: #64748b; font-size: 12px; text-align: center; padding: 20px;">
                加载中...
            </div>
        </div>
    </div>

    <!-- 右侧详情面板 -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <div class="detail-title">
                <iconify-icon icon="lucide:route"></iconify-icon>
                <span id="detailPanelTitle">航线详情</span>
            </div>
            <div class="detail-close" onclick="closeDetailPanel()">
                <iconify-icon icon="lucide:x"></iconify-icon>
            </div>
        </div>
        <div class="detail-content" id="detailContent">
            <!-- 详情内容由JS动态生成 -->
        </div>
    </div>
    
    <!-- 测量工具栏 -->
    <div class="measure-toolbar" id="measureToolbar">
        <div class="toolbar-header">
            <iconify-icon icon="lucide:ruler"></iconify-icon>
            <span>量测工具</span>
        </div>
        <div class="measure-tools">
            <button class="measure-btn" id="btnDistance" onclick="startMeasure('distance')">
                <iconify-icon icon="lucide:move-horizontal"></iconify-icon>
                <span>距离</span>
            </button>
            <button class="measure-btn" id="btnArea" onclick="startMeasure('area')">
                <iconify-icon icon="lucide:square"></iconify-icon>
                <span>面积</span>
            </button>
        </div>
        <div class="measure-instructions" id="measureInstructions">
            点击按钮开始量测
        </div>
        <div class="measure-result" id="measureResult">
            <div class="measure-result-label" id="measureResultLabel">测量结果</div>
            <div class="measure-result-value" id="measureResultValue">--</div>
            <button class="measure-clear-btn" onclick="clearMeasure()">
                <iconify-icon icon="lucide:x" width="12"></iconify-icon>
                清除测量
            </button>
        </div>
    </div>

    <!-- 图例面板 -->
    <div class="legend-panel" id="legendPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div class="legend-title">
                <iconify-icon icon="lucide:legend"></iconify-icon>
                <span>图例</span>
            </div>
            <div class="detail-close" onclick="document.getElementById('legendPanel').style.display='none'" style="cursor: pointer;">
                <iconify-icon icon="lucide:x" width="16"></iconify-icon>
            </div>
        </div>
        
        <!-- 固定航线图例 -->
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 8px;">固定航线（按级别）</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-color legend-fixed-route-Ⅰ"></div>
                    <span>Ⅰ级 - 主干航线</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-fixed-route-Ⅱ"></div>
                    <span>Ⅱ级 - 支线航线</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-fixed-route-Ⅲ"></div>
                    <span>Ⅲ级 - 末端航线</span>
                </div>
            </div>
        </div>
        
            <!-- 航路图例 -->
        <div>
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 8px;">航路（按类型）</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-color legend-airway-A"></div>
                    <span>A类航路 - 高度70m</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-airway-B"></div>
                    <span>B类航路 - 高度120m</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-airway-C"></div>
                    <span>C类航路 - 高度170m</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-airway-D"></div>
                    <span>D类航路 - 高度220m</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-flight"></div>
                    <span>连接线</span>
                </div>
            </div>
        </div>

        <!-- 航线图例 -->
        <div style="margin-top: 16px;">
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 8px;">航线</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-color" style="background: #22c55e;"></div>
                    <span>航线路径</span>
                </div>
                <div class="legend-item">
                    <div class="legend-flight-point" style="border: 1px solid white;"></div>
                    <span>起点（绿色）</span>
                </div>
                <div class="legend-item">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background: #ef4444; border: 1px solid white;"></div>
                    <span>终点（红色）</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let viewer;
        let fixedRouteEntities = [];
        let airwayEntities = [];
        let flightEntities = [];
        let selectedFlight = null;
        let layers = {
            fixedRoutes: true,
            airways: true,
            flights: true,
            links: true  // 连接线图层
        };

        // 测量功能变量
        let measureMode = null; // 'distance' | 'area' | null
        let measurePoints = []; // 测量点列表
        let measureEntities = []; // 测量相关的实体
        let measureHandler = null; // 事件处理器
        let measurePolyline = null; // 测量线实体
        let measurePolygon = null; // 测量多边形实体
        let measureLabel = null; // 测量标签

        // 业务类型对应的颜色
        const businessColors = {
            '医疗物资配送': '#ef4444',
            '快递末端配送': '#f59e0b',
            '生鲜冷链配送': '#10b981',
            '应急物资运输': '#8b5cf6',
            '商业文件专送': '#3b82f6',
            '景区游客运输': '#ec4899',
            '农业植保作业': '#22c55e',
            '电力巡检作业': '#06b6d4'
        };
        
        // 天地图token
        const tiandituToken = '4bac064681a9f35b4a7dc86368470e73';
        
        // 创建天地图卫星影像Provider
        function createTiandituSatelliteProvider() {
            return new Cesium.WebMapTileServiceImageryProvider({
                url: 'http://t0.tianditu.com/img_w/wmts?service=wmts&request=GetTile&version=1.0.0&LAYER=img&tileMatrixSet=w&TileMatrix={TileMatrix}&TileRow={TileRow}&TileCol={TileCol}&style=default&format=tiles&tk=' + tiandituToken,
                layer: 'img',
                style: 'default',
                format: 'tiles',
                tileMatrixSetID: 'w',
                maximumLevel: 18,
                credit: '天地图卫星影像'
            });
        }
        
        // 初始化
        async function init() {
            try {
                const tiandituSatelliteProvider = createTiandituSatelliteProvider();
                
                // 创建Viewer
                viewer = new Cesium.Viewer('cesiumContainer', {
                    imageryProvider: tiandituSatelliteProvider,
                    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                    baseLayerPicker: false,
                    geocoder: false,
                    homeButton: true,
                    sceneModePicker: false,
                    navigationHelpButton: false,
                    animation: false,
                    timeline: false,
                    fullscreenButton: true,

        // 加载固定航线数据
        async function loadFixedRoutes() {
            try {

                if (!response.ok) {

        // 渲染单条固定航线
        function renderFixedRoute(route) {
            // 根据航路级别设置颜色
            let color;
            if (route['航路级别'] === 'Ⅰ') {
                color = Cesium.Color.RED;
            } else if (route['航路级别'] === 'Ⅱ') {
                color = Cesium.Color.ORANGE;
            } else {
                color = Cesium.Color.GREEN;
            }
            
            // 创建航线路径，使用每个航路点的实际高度
            const positions = route['航路点'].map(wp => {
                const height = wp['高度'] !== undefined ? wp['高度'] : route['飞行高度(m)'];
                return Cesium.Cartesian3.fromDegrees(wp['坐标'][0], wp['坐标'][1], height);
            });
            
            const entity = viewer.entities.add({
                id: 'FIX_' + route['航线ID'],
                name: route['航线名称'],
                polyline: {
                    positions: positions,
                    width: 3,
                    material: color,
                    clampToGround: false
                }
            });
            
            fixedRouteEntities.push(entity);
            
            // 添加航路点标记
            route['航路点'].forEach((waypoint, index) => {
                const height = waypoint['高度'] !== undefined ? waypoint['高度'] : route['飞行高度(m)'];
                const waypointEntity = viewer.entities.add({
                    id: 'FIX_' + route['航线ID'] + '_wp_' + index,
                    name: waypoint['名称'],
                    position: Cesium.Cartesian3.fromDegrees(waypoint['坐标'][0], waypoint['坐标'][1], height),
                    point: {
                        pixelSize: 6,
                        color: index === 0 ? Cesium.Color.GREEN :
                               index === route['航路点'].length - 1 ? Cesium.Color.RED :
                               Cesium.Color.YELLOW,
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2
                    },
                    show: layers.fixedRoutes
                });
                fixedRouteEntities.push(waypointEntity);
            });

        // 加载航路数据
        function loadAirways() {
            try {
                console.log('航路数据类型:', typeof routeData);
                console.log('航路数据长度:', routeData.length);

                });

        // 渲染单条航路
        function renderAirway(airway) {
            // 解析CZML数据
            let czml;
            try {
                czml = JSON.parse(airway.CZML);
            } catch (e) {
                console.error('解析CZML失败:', airway['航路编号'], e);
                return;
            }
            
            // 根据航路类型设置颜色
            let color;
            const type = airway['航路类型'];
            if (type === 'A') {
                color = Cesium.Color.CYAN;
            } else if (type === 'B') {
                color = Cesium.Color.BLUEVIOLET;
            } else if (type === 'C') {
                color = Cesium.Color.PINK;
            } else if (type === 'D') {
                color = Cesium.Color.ORANGE;
            } else if (type === 'LINK') {
                color = Cesium.Color.YELLOW;  // LINK类型连接线用黄色
            } else {
                color = Cesium.Color.WHITE;
            }
            
            // 获取航路坐标和高度
            const positionsArray = czml.corridor.positions.cartographicDegrees;
            const positions = [];
            
            // 数据格式: [[lon, lat], lat_repeat, height, [lon, lat], lat_repeat, height, ...]
            // 索引: [0]=[lon,lat], [1]=lat_repeat, [2]=height, [3]=[lon,lat], ...
            
            for (let i = 0; i < positionsArray.length; i++) {
                const item = positionsArray[i];
                // 如果是数组，提取经纬度和高度
                if (Array.isArray(item)) {
                    // 高度在i+2位置
                    const height = (i + 2 < positionsArray.length && typeof positionsArray[i + 2] === 'number') 
                        ? positionsArray[i + 2] : 70;
                    positions.push(Cesium.Cartesian3.fromDegrees(
                        item[0], // 经度
                        item[1], // 纬度
                        height
                    ));
                    // 跳过已处理的lat_repeat和height
                    i += 2;
                }
            }
            
            if (positions.length === 0) {
                console.error('无法解析航路坐标:', airway['航路编号'], positionsArray);
                return;
            }
            
            const entity = viewer.entities.add({
                id: airway['航路编号'],
                name: airway['航路编号'],
                polyline: {
                    positions: positions,
                    width: 3,
                    material: color,
                    clampToGround: false
                },
                show: layers.airways
            });
            
            airwayEntities.push(entity);
        }
        
        // 切换图层
        function toggleLayer(layerName) {
            layers[layerName] = !layers[layerName];

            const toggle = document.getElementById('toggle' + layerName.charAt(0).toUpperCase() + layerName.slice(1));
            toggle.classList.toggle('active');

            if (layerName === 'fixedRoutes') {
                fixedRouteEntities.forEach(entity => {
                    entity.show = layers.fixedRoutes;
                });
            } else if (layerName === 'airways') {
                // 显示/隐藏原始航路（A/B/C/D类型），隐藏连接线（LK类型）
                airwayEntities.forEach(entity => {
                    const id = entity.id || '';
                    entity.show = layers.airways && !id.startsWith('LK');
                });
            } else if (layerName === 'links') {
                // 显示/隐藏连接线（LK类型）
                airwayEntities.forEach(entity => {
                    const id = entity.id || '';
                    entity.show = layers.links && id.startsWith('LK');
                });
            } else if (layerName === 'flights') {
                flightEntities.forEach(entity => {
                    entity.show = layers.flights;
                });
            }
        }

        // ============ 测量功能 ============

        // 开始测量
        function startMeasure(mode) {
            // 如果已经在同一模式下，点击取消
            if (measureMode === mode) {
                cancelMeasure();
                return;
            }

            // 清除之前的测量
            clearMeasure();

            measureMode = mode;

            // 更新按钮状态
            document.getElementById('btnDistance').classList.toggle('active', mode === 'distance');
            document.getElementById('btnArea').classList.toggle('active', mode === 'area');

            // 更新提示信息
            const instructions = document.getElementById('measureInstructions');
            if (mode === 'distance') {
                instructions.innerHTML = '左键点击添加距离点<br>右键或双击结束测量';
            } else {
                instructions.innerHTML = '左键点击添加多边形顶点<br>右键或双击完成测量';
            }

            // 隐藏结果
            document.getElementById('measureResult').classList.remove('visible');

            // 设置鼠标样式
            document.getElementById('cesiumContainer').style.cursor = 'crosshair';

            // 初始化测量点
            measurePoints = [];

            // 创建事件处理器
            measureHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

            // 左键点击添加点
            measureHandler.setInputAction(function(click) {
                addMeasurePoint(click.position);
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

            // 右键结束测量
            measureHandler.setInputAction(function(click) {
                finishMeasure();
            }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

            // 双击结束测量
            measureHandler.setInputAction(function(click) {
                finishMeasure();
            }, Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);
        }

        // 添加测量点
        function addMeasurePoint(screenPosition) {
            // 获取地形上的点
            const ray = viewer.camera.getPickRay(screenPosition);
            const cartesian = viewer.scene.globe.pick(ray, viewer.scene);

            if (!cartesian) {
                console.warn('无法获取地形点');
                return;
            }

            measurePoints.push(cartesian);

            // 添加标记点
            const markerEntity = viewer.entities.add({
                position: cartesian,
                point: {
                    pixelSize: 8,
                    color: Cesium.Color.CYAN,
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 2
                }
            });
            measureEntities.push(markerEntity);

            // 更新显示
            updateMeasureDisplay();
        }

        // 更新测量显示
        function updateMeasureDisplay() {
            // 清除旧的线和多边形
            if (measurePolyline) {
                viewer.entities.remove(measurePolyline);
                measurePolyline = null;
            }
            if (measurePolygon) {
                viewer.entities.remove(measurePolygon);
                measurePolygon = null;
            }
            if (measureLabel) {
                viewer.entities.remove(measureLabel);
                measureLabel = null;
            }

            if (measurePoints.length === 0) return;

            if (measureMode === 'distance') {
                // 距离测量
                if (measurePoints.length >= 2) {
                    // 绘制线
                    measurePolyline = viewer.entities.add({
                        polyline: {
                            positions: measurePoints,
                            width: 3,
                            material: new Cesium.PolylineGlowMaterialProperty({
                                glowPower: 0.2,
                                color: Cesium.Color.CYAN
                            })
                        }
                    });

                    // 计算总距离（使用地球表面弧长）
                    let totalDistance = 0;
                    for (let i = 0; i < measurePoints.length - 1; i++) {
                        totalDistance += geodesicDistance(measurePoints[i], measurePoints[i + 1]);
                    }

                    // 显示标签
                    const lastPoint = measurePoints[measurePoints.length - 1];
                    measureLabel = viewer.entities.add({
                        position: lastPoint,
                        label: {
                            text: formatDistance(totalDistance),
                            font: '14px sans-serif',
                            fillColor: Cesium.Color.WHITE,
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            pixelOffset: new Cesium.Cartesian2(15, -15),
                            showBackground: true,
                            backgroundColor: new Cesium.Color(0.2, 0.6, 0.8, 0.8)
                        }
                    });

                    // 显示结果
                    document.getElementById('measureResult').classList.add('visible');
                    document.getElementById('measureResultLabel').textContent = '总距离';
                    document.getElementById('measureResultValue').textContent = formatDistance(totalDistance);
                } else {
                    // 单点显示距离提示
                    const lastPoint = measurePoints[measurePoints.length - 1];
                    measureLabel = viewer.entities.add({
                        position: lastPoint,
                        label: {
                            text: '起点',
                            font: '12px sans-serif',
                            fillColor: Cesium.Color.CYAN,
                            pixelOffset: new Cesium.Cartesian2(10, -10)
                        }
                    });
                }
            } else if (measureMode === 'area') {
                // 面积测量
                if (measurePoints.length >= 3) {
                    // 绘制多边形
                    const polygonPositions = [...measurePoints, measurePoints[0]]; // 闭合多边形
                    measurePolygon = viewer.entities.add({
                        polygon: {
                            hierarchy: new Cesium.PolygonHierarchy(measurePoints),
                            material: new Cesium.ColorMaterialProperty(
                                new Cesium.Color(0.2, 0.6, 0.8, 0.3)
                            ),
                            outline: true,
                            outlineColor: Cesium.Color.CYAN,
                            outlineWidth: 2
                        }
                    });

                    // 绘制边框线
                    measurePolyline = viewer.entities.add({
                        polyline: {
                            positions: polygonPositions,
                            width: 2,
                            material: Cesium.Color.CYAN
                        }
                    });

                    // 计算面积
                    const area = calculateArea(measurePoints);

                    // 显示标签
                    const centroid = getCentroid(measurePoints);
                    measureLabel = viewer.entities.add({
                        position: centroid,
                        label: {
                            text: formatArea(area),
                            font: '14px sans-serif',
                            fillColor: Cesium.Color.WHITE,
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            showBackground: true,
                            backgroundColor: new Cesium.Color(0.2, 0.6, 0.8, 0.8)
                        }
                    });

                    // 显示结果
                    document.getElementById('measureResult').classList.add('visible');
                    document.getElementById('measureResultLabel').textContent = '面积';
                    document.getElementById('measureResultValue').textContent = formatArea(area);
                } else if (measurePoints.length === 2) {
                    // 两个点画线提示
                    measurePolyline = viewer.entities.add({
                        polyline: {
                            positions: measurePoints,
                            width: 2,
                            material: Cesium.Color.CYAN
                        }
                    });
                }
            }
        }

        // 格式化距离
        function formatDistance(meters) {
            if (meters < 1000) {
                return meters.toFixed(1) + ' 米';
            } else {
                return (meters / 1000).toFixed(2) + ' 公里';
            }
        }

        // 格式化面积
        function formatArea(squareMeters) {
            if (squareMeters < 10000) {
                return squareMeters.toFixed(1) + ' 平方米';
            } else if (squareMeters < 1000000) {
                return (squareMeters / 10000).toFixed(2) + ' 万平方米';
            } else {
                return (squareMeters / 1000000).toFixed(2) + ' 平方公里';
            }
        }

        // 大地线距离（使用Haversine公式计算地球表面弧长，单位：米）
        function geodesicDistance(cartesian1, cartesian2) {
            const c1 = Cesium.Cartographic.fromCartesian(cartesian1);
            const c2 = Cesium.Cartographic.fromCartesian(cartesian2);

            const R = 6371000; // 地球平均半径（米）
            const lat1 = c1.latitude;
            const lat2 = c2.latitude;
            const dLat = lat2 - lat1;
            const dLon = c2.longitude - c1.longitude;

            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                       Math.cos(lat1) * Math.cos(lat2) *
                       Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        // 计算多边形面积（使用高斯-格林面积公式在笛卡尔空间计算）
        function calculateArea(positions) {
            const n = positions.length;
            if (n < 3) return 0;

            // 转换为经纬度
            const cartographics = positions.map(p => Cesium.Cartographic.fromCartesian(p));

            // 使用Shoelace公式计算球面多边形面积
            // 适用于小范围区域（几十公里以内）
            let sum = 0;
            const earthRadius = 6371000; // 米

            for (let i = 0; i < n; i++) {
                const j = (i + 1) % n;

                // 将弧度转换为度用于Shoelace计算
                const lon1 = cartographics[i].longitude * (180 / Math.PI);
                const lat1 = cartographics[i].latitude * (180 / Math.PI);
                const lon2 = cartographics[j].longitude * (180 / Math.PI);
                const lat2 = cartographics[j].latitude * (180 / Math.PI);

                // 经纬度转米（简化）
                const latMid = (lat1 + lat2) / 2;
                const metersPerDegreeLat = 111132.92; // 纬度每度约111km
                const metersPerDegreeLon = 111132.92 * Math.cos(latMid * Math.PI / 180);

                const x1 = lon1 * metersPerDegreeLon;
                const y1 = lat1 * metersPerDegreeLat;
                const x2 = lon2 * metersPerDegreeLon;
                const y2 = lat2 * metersPerDegreeLat;

                sum += x1 * y2 - x2 * y1;
            }

            // 面积 = |sum| / 2
            const area = Math.abs(sum) / 2;

            return area;
        }

        // 获取多边形重心
        function getCentroid(positions) {
            let x = 0, y = 0, z = 0;
            positions.forEach(p => {
                x += p.x;
                y += p.y;
                z += p.z;
            });
            const n = positions.length;
            return new Cesium.Cartesian3(x / n, y / n, z / n);
        }

                const items = grouped[type];
                html += `
                    <div class="flight-category">
                        <div class="flight-category-header ${index > 0 ? 'collapsed' : ''}" onclick="toggleCategory(this)">

                            <span style="color: ${color};">●</span>
                            <span>${type}</span>

                        <div class="flight-category-items ${index > 0 ? 'hidden' : ''}">

                                    <div class="flight-item-info">
                                        <div class="flight-item-name">${flight['航线名称']}</div>
                                        <div class="flight-item-route">${flight['所属航路']} | ${(flight['航线距离_m']/1000).toFixed(1)}km</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            treeContainer.innerHTML = html;
        }

        // 切换分类展开/收起
        function toggleCategory(header) {
            header.classList.toggle('collapsed');
            const items = header.nextElementSibling;
            items.classList.toggle('hidden');
        }

        // 选中航线
        function selectFlight(flightId, event) {
            event.stopPropagation();
            
            // 取消之前选中
            document.querySelectorAll('.flight-item.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            // 高亮选中项
            const item = document.querySelector(`[data-flight-id="${flightId}"]`);
            if (item) {
                item.classList.add('selected');
            }

            // 查找航线数据
            const flight = flightData.find(f => f['航线ID'] === flightId);
            if (flight) {
                selectedFlight = flight;
                highlightFlight(flight);
                showFlightDetail(flight);
            }
        }

        // 高亮显示航线
        function highlightFlight(flight) {
            // 重置所有航线为灰色
            flightEntities.forEach(entity => {
                if (entity._polyline) {
                    entity._polyline.material = Cesium.Color.fromCssColorString('#6b7280');
                    entity._polyline.width = 4;
                }
            });

            // 高亮当前航线为黄色
            const routeEntity = viewer.entities.getById('FL_ROUTE_' + flight['航线ID']);
            if (routeEntity && routeEntity._polyline) {
                routeEntity._polyline.material = Cesium.Color.fromCssColorString('#fbbf24');
                routeEntity._polyline.width = 6;
            }
        }

        // 显示航线详情
        function showFlightDetail(flight) {
            const panel = document.getElementById('detailPanel');
            const title = document.getElementById('detailPanelTitle');
            const content = document.getElementById('detailContent');

            title.textContent = flight['航线名称'];
            
            const businessType = flight['业务类型'];
            const color = businessColors[businessType] || '#22c55e';

            content.innerHTML = `
                <div class="detail-section">
                    <div class="detail-section-title">基本信息</div>
                    <div class="detail-row">
                        <span class="detail-label">航线ID</span>
                        <span class="detail-value">${flight['航线ID']}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">所属航路</span>
                        <span class="detail-value">${flight['所属航路']}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">航路级别</span>
                        <span class="detail-value">${flight['航路级别']}级</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">航路类型</span>
                        <span class="detail-value">${flight['航路类型']}类</span>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">航程信息</div>
                    <div class="detail-row">
                        <span class="detail-label">起点</span>
                        <span class="detail-value highlight">${flight['起点名称']}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">终点</span>
                        <span class="detail-value highlight">${flight['终点名称']}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">航线距离</span>
                        <span class="detail-value">${(flight['航线距离_m'] / 1000).toFixed(1)} km</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">最高限速</span>
                        <span class="detail-value">${flight['最高限速_kmh']} km/h</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">预计飞行时间</span>
                        <span class="detail-value">${flight['预计飞行时间_min']} 分钟</span>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">坐标信息</div>
                    <div class="detail-coordinates">
                        <div class="coord-badge">起点: ${flight['起点坐标']['lon'].toFixed(6)}, ${flight['起点坐标']['lat'].toFixed(6)}</div>
                    </div>
                    <div class="detail-coordinates">
                        <div class="coord-badge">终点: ${flight['终点坐标']['lon'].toFixed(6)}, ${flight['终点坐标']['lat'].toFixed(6)}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">业务信息</div>
                    <div class="detail-business">
                        <div class="detail-business-type" style="color: ${color};">${flight['业务类型']}</div>
                        <div class="detail-business-goal">${flight['业务目标']}</div>
                        <div class="detail-business-analysis">${flight['业务分析']}</div>
                    </div>
                </div>
            `;

            panel.classList.add('visible');
        }

        // 关闭详情面板
        function closeDetailPanel() {
            const panel = document.getElementById('detailPanel');
            panel.classList.remove('visible');
            
            // 取消航线选中
            document.querySelectorAll('.flight-item.selected').forEach(el => {
                el.classList.remove('selected');
            });
            selectedFlight = null;

            // 恢复所有航线为灰色
            flightEntities.forEach(entity => {
                if (entity._polyline) {
                    entity._polyline.material = Cesium.Color.fromCssColorString('#6b7280');
                    entity._polyline.width = 4;
                }
            });
        }

        // 渲染单条航线
        function renderFlight(flight) {
            // 获取航线完整三维坐标
            const flightCoords = flight['航线坐标'];
            let positions;

            if (flightCoords && flightCoords.length > 0) {
                // 使用航路的完整三维坐标 [lon, lat, height]
                positions = [];
                for (let i = 0; i < flightCoords.length; i++) {
                    // 航线坐标格式: [(lon, lat, height), ...]
                    positions.push(flightCoords[i][0], flightCoords[i][1], flightCoords[i][2] + 5);
                }
            } else {
                // 备用
                const startLon = flight['起点坐标']['lon'];
                const startLat = flight['起点坐标']['lat'];
                const endLon = flight['终点坐标']['lon'];
                const endLat = flight['终点坐标']['lat'];
                const startHeight = flight['起点坐标']['height'] || 70;
                const endHeight = flight['终点坐标']['height'] || 70;
                positions = [startLon, startLat, startHeight + 5, endLon, endLat, endHeight + 5];
            }

            // 添加航线路径
            const routeEntity = viewer.entities.add({
                id: 'FL_ROUTE_' + flight['航线ID'],
                name: flight['航线名称'],
                polyline: {
                    positions: Cesium.Cartesian3.fromDegreesArrayHeights(positions),
                    width: 4,
                    material: Cesium.Color.fromCssColorString('#6b7280'),  // 默认灰色
                    clampToGround: false
                },
                description: `
                    <div style="padding: 8px; max-width: 300px;">
                        <h3 style="margin: 0 0 8px 0;">${flight['航线名称']}</h3>
                        <p><strong>航线ID:</strong> ${flight['航线ID']}</p>
                        <p><strong>所属航路:</strong> ${flight['所属航路']} (${flight['航路级别']}级${flight['航路类型']}类)</p>
                        <p><strong>起点:</strong> ${flight['起点名称']}</p>
                        <p><strong>终点:</strong> ${flight['终点名称']}</p>
                        <p><strong>航线距离:</strong> ${(flight['航线距离_m'] / 1000).toFixed(1)} km</p>
                        <p><strong>最高限速:</strong> ${flight['最高限速_kmh']} km/h</p>
                        <p><strong>预计飞行时间:</strong> ${flight['预计飞行时间_min']} 分钟</p>
                        <hr style="margin: 8px 0; border: none; border-top: 1px solid #333;">
                        <p><strong>业务类型:</strong> ${flight['业务类型']}</p>
                        <p><strong>业务目标:</strong> ${flight['业务目标']}</p>
                        <p style="margin-top: 8px; font-size: 12px; color: #666;">${flight['业务分析']}</p>
                    </div>
                `,
                show: layers.flights
            });
            flightEntities.push(routeEntity);
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
