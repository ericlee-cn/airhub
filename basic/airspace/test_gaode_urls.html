<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>测试高德地图URL</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
        #cesiumContainer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        console.log('开始测试高德地图URL...');

        // 测试不同的高德地图URL
        const testURLs = [
            {
                name: '高德道路地图 style=8',
                url: 'https://webrd02.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}'
            },
            {
                name: '高德道路地图 style=7',
                url: 'https://webrd02.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}'
            },
            {
                name: '高德卫星影像 style=6',
                url: 'https://webst02.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}'
            },
            {
                name: '高德卫星影像 style=6 (带参数)',
                url: 'https://webst02.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}&lang=zh_cn&size=1&scale=1'
            }
        ];

        // 默认使用第一个
        let currentIndex = 0;

        function createViewer(urlConfig) {
            console.log('尝试URL:', urlConfig.name);
            console.log('URL:', urlConfig.url);

            const provider = new Cesium.UrlTemplateImageryProvider({
                url: urlConfig.url,
                tilingScheme: new Cesium.WebMercatorTilingScheme(),
                maximumLevel: 18,
                credit: urlConfig.name
            });

            const viewer = new Cesium.Viewer('cesiumContainer', {
                imageryProvider: provider,
                terrainProvider: new Cesium.EllipsoidTerrainProvider(),
                baseLayerPicker: false,
                geocoder: false,
                homeButton: false,
                sceneModePicker: false,
                navigationHelpButton: false,
                animation: false,
                timeline: false,
                fullscreenButton: false,
                vrButton: false,
                infoBox: false,
                selectionIndicator: false,
                shadows: false,
                shouldAnimate: false
            });

            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(119.9788, 30.5335, 50000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-45),
                    roll: 0
                }
            });

            return viewer;
        }

        const viewer = createViewer(testURLs[currentIndex]);

        // 10秒后如果没有影像，尝试下一个
        setTimeout(() => {
            console.log('当前测试:', testURLs[currentIndex].name);
            console.log('图层数量:', viewer.imageryLayers.length);
        }, 5000);

        // 添加控制台信息
        console.log('===================');
        console.log('测试的高德地图URL列表:');
        testURLs.forEach((item, index) => {
            console.log(`${index + 1}. ${item.name}`);
            console.log(`   ${item.url}`);
        });
        console.log('===================');
    </script>
</body>
</html>
