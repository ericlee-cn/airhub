<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <title>标签切换测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #030a1c; color: #e2e8f0; }
        .tab-button {
            transition: all 0.3s;
            position: relative;
            color: #94a3b8;
            background: transparent;
        }
        .tab-button:hover {
            background: rgba(0, 170, 255, 0.05);
            color: #00aaff;
        }
        .tab-button.active {
            background: rgba(0, 170, 255, 0.15);
            color: #00aaff;
            border-bottom: 2px solid #00aaff;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="min-h-screen p-8">
            <h1 class="text-2xl font-bold mb-6 text-white">标签切换测试</h1>
            
            <div class="w-96 border border-slate-700 rounded bg-slate-900/50">
                <!-- 切换标签 -->
                <div class="flex border-b border-slate-700">
                    <button 
                        @click="currentTab = 'rules'"
                        class="flex-1 py-3 text-center font-semibold transition-all tab-button"
                        :class="{ 'active': currentTab === 'rules' }"
                    >
                        <span class="iconify text-lg mr-2" data-icon="lucide:scroll"></span>
                        <span class="text-base">低空规则</span>
                    </button>
                    <button 
                        @click="currentTab = 'indicators'"
                        class="flex-1 py-3 text-center font-semibold transition-all tab-button"
                        :class="{ 'active': currentTab === 'indicators' }"
                    >
                        <span class="iconify text-lg mr-2" data-icon="lucide:bar-chart-2"></span>
                        <span class="text-base">评估指标</span>
                    </button>
                </div>
                
                <!-- 内容区域 -->
                <div class="p-6">
                    <div v-if="currentTab === 'rules'" class="text-green-400">
                        <p class="text-xl font-bold mb-2">✓ 低空规则内容</p>
                        <p class="text-slate-400">当前标签: {{ currentTab }}</p>
                    </div>
                    <div v-if="currentTab === 'indicators'" class="text-blue-400">
                        <p class="text-xl font-bold mb-2">✓ 评估指标内容</p>
                        <p class="text-slate-400">当前标签: {{ currentTab }}</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 p-4 bg-slate-800/50 rounded">
                <p class="text-slate-400">调试信息:</p>
                <p class="text-yellow-400">currentTab: <strong>{{ currentTab }}</strong></p>
                <p class="text-yellow-400">Vue版本: <strong>3.x</strong></p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        
        const App = {
            setup() {
                const currentTab = ref('rules');
                
                return { currentTab };
            }
        };
        
        createApp(App).mount('#app');
    </script>
</body>
</html>
