<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <title>低空仿真系统配置平台</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #030a1c;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .nav-active { border-bottom: 2px solid #00aaff; color: #00aaff; background: rgba(0,170,255,0.1) !important; }
        nav a { color: #e2e8f0 !important; }
        .glass-panel {
            background: rgba(15,23,42,0.85);
            border: 1px solid rgba(0,170,255,0.2);
            backdrop-filter: blur(12px);
        }
        .rule-grid {
            background: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.15;
        }
        .section-title {
            font-size: 12px; font-weight: bold; color: #f97316;
            text-transform: uppercase; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid rgba(249,115,22,0.2); padding-bottom: 4px;
        }
        .tree-category { cursor: pointer; transition: all 0.2s; }
        .tree-category:hover { background: rgba(249,115,22,0.1); }
        .tree-item {
            cursor: pointer;
            border-left: 1px solid rgba(249,115,22,0.3);
            margin-left: 20px;
            transition: all 0.2s;
        }
        .tree-item:hover { background: rgba(0,170,255,0.1); color: #00aaff; }
        .tree-item.active { background: rgba(249,115,22,0.15); border-left: 2px solid #f97316; color: #f97316; }
        .tab-button { transition: all 0.3s; position: relative; color: #94a3b8; background: transparent; }
        .tab-button:hover { background: rgba(0,170,255,0.05); color: #00aaff; }
        .tab-button.active { background: rgba(0,170,255,0.15); color: #00aaff; border-bottom: 2px solid #00aaff; }
        .rotate-90 { transform: rotate(90deg); }
        .animate-spin { animation: spin 1s linear infinite; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .status-info { background: rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); border-left:4px solid #3b82f6; }
        .status-success { background: rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.2); border-left:4px solid #22c55e; }
        .status-error { background: rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); border-left:4px solid #ef4444; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

function downloadCSV(csvContent, fileName) {
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
}

createApp({
    setup() {
        const currentTab = ref('rules');

        // ── 规则数据 ──
        const rulesData = ref([]);
        const groupedRules = ref({});
        const selectedRule = ref(null);
        const loadingRules = ref(true);
        const rulesError = ref(null);
        const rulesLoaded = ref(false);
        const totalRules = ref(0);
        const expandedCategoriesRules = ref({});
        const allExpandedRules = ref(true);

        // ── 标准规范数据 ──
        const standardsData = ref([]);
        const groupedStandards = ref({});
        const selectedStandard = ref(null);
        const loadingStandards = ref(true);
        const standardsError = ref(null);
        const standardsLoaded = ref(false);
        const expandedStandardCategories = reactive({});
        const totalStandards = ref(0);

        // ── 指标数据 ──
        const indicatorsData = ref([]);
        const groupedIndicators = ref({});
        const selectedIndicator = ref(null);
        const loadingIndicators = ref(true);
        const indicatorsError = ref(null);
        const indicatorsLoaded = ref(false);
        const expandedCategoriesIndicators = reactive({});
        const allExpandedIndicators = ref(true);
        const totalIndicators = ref(0);
        const indicatorsRulesMap = ref({});  // id -> rules[]

        // ── computed ──
        const ruleCountByCategory = computed(() => {
            const r = {};
            for (const cat in groupedRules.value)
                r[cat] = new Set(groupedRules.value[cat].map(i => i.规则名称)).size;
            return r;
        });
        const rulesByCategory = computed(() => {
            const r = {};
            for (const cat in groupedRules.value) {
                const g = {};
                groupedRules.value[cat].forEach(item => {
                    const n = item.规则名称 || '未命名';
                    if (!g[n]) g[n] = [];
                    g[n].push(item);
                });
                r[cat] = g;
            }
            return r;
        });
        const indicatorCountByCategory = computed(() => {
            const r = {};
            for (const cat in groupedIndicators.value)
                r[cat] = (groupedIndicators.value[cat] || []).length;
            return r;
        });
        const ruleSources = computed(() => {
            if (!selectedRule.value) return [];
            const seen = new Set();
            return (selectedRule.value.items || []).filter(item => {
                if (item['来源文号'] && !seen.has(item['来源文号'])) { seen.add(item['来源文号']); return true; }
                return false;
            }).map(item => item['来源文号']);
        });

        // ── Tab 切换 ──
        const switchTab = (tab) => {
            if (tab === 'rules') { selectedStandard.value = null; selectedIndicator.value = null; }
            else if (tab === 'sources') { selectedRule.value = null; selectedIndicator.value = null; }
            else if (tab === 'indicators') { selectedRule.value = null; selectedStandard.value = null; }
            currentTab.value = tab;
        };

        // ── 数据处理 ──
        const processRulesData = (data) => {
            rulesData.value = data;
            totalRules.value = data.length;
            const grouped = {};
            data.forEach(item => { const c = item.规则维度||'未分类'; if(!grouped[c]) grouped[c]=[]; grouped[c].push(item); });
            groupedRules.value = grouped;
            const ec = {}; Object.keys(grouped).forEach(c => { ec[c] = true; });
            expandedCategoriesRules.value = ec;
            allExpandedRules.value = true;
        };
        const processStandardsData = (data) => {
            standardsData.value = data; totalStandards.value = data.length;
            const grouped = {};
            data.forEach(item => { const c = item.category||'其他'; if(!grouped[c]) grouped[c]=[]; grouped[c].push(item); });
            groupedStandards.value = grouped;
            Object.keys(grouped).forEach(c => { expandedStandardCategories[c] = true; });
        };
        const processIndicatorsData = (data) => {
            indicatorsData.value = data; totalIndicators.value = data.length;
            const grouped = {};
            data.forEach(item => { const c = item['指标分类']||'未分类'; if(!grouped[c]) grouped[c]=[]; grouped[c].push(item); });
            groupedIndicators.value = grouped;
            Object.keys(grouped).forEach(c => { expandedCategoriesIndicators[c] = true; });
            allExpandedIndicators.value = true;
        };

        // ── 数据加载 ──
        const loadRulesCSV = () => {
            loadingRules.value = true; rulesError.value = null;
            fetch('./rules.csv').then(r => { if(!r.ok) throw new Error(`加载失败(${r.status})`); return r.text(); })
            .then(csv => { Papa.parse(csv, { header:true, skipEmptyLines:true, complete:(res) => {
                try { if(res.errors.length) { rulesError.value=res.errors[0].message; rulesLoaded.value=false; } else { processRulesData(res.data); rulesLoaded.value=true; } }
                catch(e) { rulesError.value=`数据处理失败:${e.message}`; rulesLoaded.value=false; }
                finally { loadingRules.value=false; }
            }}); }).catch(e => { rulesError.value=`加载失败:${e.message}`; rulesLoaded.value=false; loadingRules.value=false; });
        };
        const loadStandardsJSON = () => {
            loadingStandards.value = true; standardsError.value = null;
            fetch('./standards.json').then(r => { if(!r.ok) throw new Error(`加载失败(${r.status})`); return r.json(); })
            .then(json => { processStandardsData(json.standards||[]); standardsLoaded.value=true; loadingStandards.value=false; })
            .catch(e => { standardsError.value=`加载失败:${e.message}`; standardsLoaded.value=false; loadingStandards.value=false; });
        };
        const loadIndicatorsCSV = () => {
            loadingIndicators.value = true; indicatorsError.value = null;
            fetch('./evaluation_indicators.csv').then(r => { if(!r.ok) throw new Error(`加载失败(${r.status})`); return r.text(); })
            .then(csv => { Papa.parse(csv, { header:true, skipEmptyLines:true, complete:(res) => {
                if(res.errors.length) { indicatorsError.value=res.errors[0].message; indicatorsLoaded.value=false; }
                else { processIndicatorsData(res.data); indicatorsLoaded.value=true; }
                loadingIndicators.value=false;
            }}); }).catch(e => { indicatorsError.value=`加载失败:${e.message}`; indicatorsLoaded.value=false; loadingIndicators.value=false; });
        };
        const loadIndicatorsRules = () => {
            fetch('./indicators_rules.json').then(r => r.json())
            .then(json => {
                const map = {};
                (json.indicators || []).forEach(item => { map[item.id] = item.rules || []; });
                indicatorsRulesMap.value = map;
            }).catch(() => {});
        };

        // ── 规则操作 ──
        const selectRule = (category, ruleName, ruleItems) => {
            selectedRule.value = { category, name: ruleName, items: ruleItems };
        };
        const exportSelectedRule = () => {
            if (!selectedRule.value) return;
            const csv = Papa.unparse(selectedRule.value.items.map(item => ({
                规则维度: item.规则维度, 规则名称: item.规则名称, 参数名: item.参数名, 参数值: item.参数值,
                '配置要求/说明': item['配置要求/说明'], 来源: item['来源']||'', 来源文号: item['来源文号']||''
            })));
            downloadCSV(csv, `${selectedRule.value.category}_${selectedRule.value.name}_配置.csv`);
        };

        // ── 标准规范操作 ──
        const selectStandard = (std) => { selectedStandard.value = std; };
        const toggleStandardCategory = (category) => { expandedStandardCategories[category] = !expandedStandardCategories[category]; };
        const jumpToStandard = (sourceCode) => {
            if (!standardsLoaded.value || !sourceCode) return;
            const codePrefix = sourceCode.split(' ')[0].trim();
            const matched = standardsData.value.find(s => s.code===codePrefix || s.code===sourceCode.trim() || sourceCode.startsWith(s.code));
            currentTab.value = 'sources';
            selectedRule.value = null; selectedIndicator.value = null;
            nextTick(() => { selectedStandard.value = matched||null; if(matched) expandedStandardCategories[matched.category]=true; });
        };

        // ── 指标操作 ──
        const selectIndicator = (indicator) => { selectedIndicator.value = indicator; };
        const exportSelectedIndicator = () => {
            if (!selectedIndicator.value) return;
            downloadCSV(Papa.unparse([selectedIndicator.value]), `指标_${selectedIndicator.value['指标ID']}_${selectedIndicator.value['指标名称']}.csv`);
        };

        // ── 展开/折叠 ──
        const toggleCategory = (type, category) => {
            if (type==='rules') { expandedCategoriesRules.value[category]=!expandedCategoriesRules.value[category]; allExpandedRules.value=Object.keys(expandedCategoriesRules.value).every(c=>expandedCategoriesRules.value[c]); }
            else if (type==='indicators') { expandedCategoriesIndicators[category]=!expandedCategoriesIndicators[category]; allExpandedIndicators.value=Object.keys(expandedCategoriesIndicators).every(c=>expandedCategoriesIndicators[c]); }
        };
        const toggleAllCategories = (type) => {
            if (type==='rules') { const s=!allExpandedRules.value; const ne={}; Object.keys(expandedCategoriesRules.value).forEach(c=>{ne[c]=s;}); expandedCategoriesRules.value=ne; allExpandedRules.value=s; }
            else if (type==='indicators') { const s=!allExpandedIndicators.value; Object.keys(expandedCategoriesIndicators).forEach(c=>{expandedCategoriesIndicators[c]=s;}); allExpandedIndicators.value=s; }
        };

        onMounted(() => { loadRulesCSV(); loadStandardsJSON(); loadIndicatorsCSV(); loadIndicatorsRules(); });

        return {
            currentTab, switchTab,
            groupedRules, selectedRule, loadingRules, rulesError, rulesLoaded, totalRules,
            expandedCategoriesRules, allExpandedRules,
            ruleCountByCategory, rulesByCategory, ruleSources,
            selectRule, exportSelectedRule, jumpToStandard,
            groupedStandards, selectedStandard, loadingStandards, standardsError, standardsLoaded, totalStandards,
            expandedStandardCategories, selectStandard, toggleStandardCategory,
            groupedIndicators, selectedIndicator, loadingIndicators, indicatorsError, indicatorsLoaded, totalIndicators,
            expandedCategoriesIndicators, allExpandedIndicators, indicatorCountByCategory,
            selectIndicator, exportSelectedIndicator, indicatorsRulesMap,
            toggleCategory, toggleAllCategories,
        };
    },
    template: `
        <div class="flex flex-col h-screen">
            <header class="h-16 flex items-center justify-between px-6 border-b border-slate-700 glass-panel z-50">
                <div class="flex items-center gap-3">
                    <span class="iconify text-3xl text-blue-400" data-icon="lucide:gavel"></span>
                    <h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">低空仿真基础模型管理系统</h1>
                </div>
                <nav class="flex gap-1 h-full justify-center">
                    <a class="flex items-center px-4 transition-all hover:bg-slate-800" href="../terrain.html"><span class="iconify mr-2" data-icon="lucide:map"></span>地理环境</a>
                    <a class="flex items-center px-4 transition-all hover:bg-slate-800" href="../electromagnetic/electromagnetic.html"><span class="iconify mr-2" data-icon="lucide:waves"></span>电磁环境</a>
                    <a class="flex items-center px-4 transition-all hover:bg-slate-800" href="../weather/weather_cesium.html"><span class="iconify mr-2" data-icon="lucide:cloud-sun"></span>气象环境</a>
                    <a class="flex items-center px-4 transition-all hover:bg-slate-800" href="../airspace/index.html"><span class="iconify mr-2" data-icon="lucide:layers"></span>空域航路</a>
                    <a class="flex items-center px-4 transition-all hover:bg-slate-800 nav-active" href="index.html"><span class="iconify mr-2" data-icon="lucide:gavel"></span>飞行规则</a>
                    <a class="flex items-center px-4 transition-all hover:bg-slate-800" href="../assets/index.html"><span class="iconify mr-2" data-icon="lucide:database"></span>装备库</a>
                </nav>
                <div style="display:flex;align-items:center;gap:8px;margin-left:16px;padding-right:8px;">
                    <a href="../index.html" title="基础管理主页" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;background:rgba(0,170,255,0.12);border:1px solid rgba(0,170,255,0.35);color:#60c8ff;text-decoration:none;">
                        <span class="iconify" data-icon="lucide:layout-dashboard" style="font-size:17px;"></span>
                    </a>
                    <a href="../../main.html" title="系统主页面" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.35);color:#c084fc;text-decoration:none;">
                        <span class="iconify" data-icon="lucide:home" style="font-size:17px;"></span>
                    </a>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">

                <div class="w-80 glass-panel border-r border-slate-800 flex flex-col">
                    <div class="flex border-b border-slate-700 bg-slate-800/30">
                        <button @click="switchTab('rules')" class="flex-1 py-3 px-4 text-center font-semibold transition-all tab-button flex items-center justify-center gap-2" :class="{ 'active': currentTab === 'rules' }">
                            <span class="iconify text-lg" data-icon="lucide:scroll"></span><span class="text-base">低空规则</span>
                        </button>
                        <button @click="switchTab('sources')" class="flex-1 py-3 px-4 text-center font-semibold transition-all tab-button flex items-center justify-center gap-2" :class="{ 'active': currentTab === 'sources' }">
                            <span class="iconify text-lg" data-icon="lucide:library"></span><span class="text-base">标准规范</span>
                        </button>
                        <button @click="switchTab('indicators')" class="flex-1 py-3 px-4 text-center font-semibold transition-all tab-button flex items-center justify-center gap-2" :class="{ 'active': currentTab === 'indicators' }">
                            <span class="iconify text-lg" data-icon="lucide:bar-chart-2"></span><span class="text-base">评估指标</span>
                        </button>
                    </div>

                    <div v-show="currentTab === 'rules'" class="flex-1 overflow-y-auto p-4">
                        <div class="mb-6">
                            <div class="section-title"><span class="iconify" data-icon="mdi:database"></span>数据源状态</div>
                            <div class="space-y-3">
                                <div v-if="loadingRules" class="p-3 status-info rounded"><div class="flex items-center gap-2"><span class="iconify animate-spin text-blue-400" data-icon="mdi:loading"></span><span class="text-blue-300">正在加载 rules.csv...</span></div></div>
                                <div v-if="!loadingRules && rulesLoaded" class="p-3 status-success rounded"><div class="grid grid-cols-2 gap-3"><div class="text-center p-2 bg-slate-800/50 rounded"><p class="text-xs text-slate-400">规则维度</p><p class="text-lg font-bold text-white">{{ Object.keys(groupedRules).length }} 类</p></div><div class="text-center p-2 bg-slate-800/50 rounded"><p class="text-xs text-slate-400">配置参数</p><p class="text-lg font-bold text-white">{{ totalRules }} 条</p></div></div></div>
                                <div v-if="!loadingRules && rulesError" class="p-3 status-error rounded"><div class="flex items-center gap-2"><span class="iconify text-red-400" data-icon="mdi:alert-circle"></span><span class="text-red-300">{{ rulesError }}</span></div></div>
                            </div>
                        </div>
                        <div>
                            <div class="section-title flex justify-between items-center">
                                <div class="flex items-center gap-2"><span class="iconify" data-icon="mdi:sitemap"></span>规则分类</div>
                                <button v-if="rulesLoaded && Object.keys(groupedRules).length > 0" @click="toggleAllCategories('rules')" class="text-xs text-slate-400 hover:text-slate-300">{{ allExpandedRules ? '全部收起' : '全部展开' }}</button>
                            </div>
                            <div v-if="rulesLoaded && Object.keys(groupedRules).length > 0" class="space-y-2">
                                <div v-for="(rules, category) in groupedRules" :key="category" class="tree-category">
                                    <div class="flex items-center gap-2 p-2 rounded hover:bg-slate-800 cursor-pointer transition-all"
                                        @click="toggleCategory('rules', category)">
                                        <span class="iconify transition-transform" :class="{ 'rotate-90': expandedCategoriesRules[category] }" data-icon="mdi:chevron-right"></span>
                                        <span class="font-semibold text-orange-400">{{ category }}</span>
                                        <span class="text-xs bg-slate-700 px-2 py-1 rounded-full ml-auto">{{ ruleCountByCategory[category] || 0 }}</span>
                                    </div>
                                    <div v-show="expandedCategoriesRules[category]" class="ml-6 space-y-1">
                                        <div v-for="(ruleItems, ruleName) in rulesByCategory[category]" :key="ruleName"
                                            class="tree-item p-2 rounded"
                                            :class="{ 'active': selectedRule && selectedRule.name === ruleName && selectedRule.category === category }"
                                            @click="selectRule(category, ruleName, ruleItems)">
                                            <div class="flex items-center gap-2">
                                                <span class="iconify text-blue-400" data-icon="mdi:cog"></span>
                                                <span class="text-sm truncate">{{ ruleName }}</span>
                                                <span class="text-xs bg-slate-600 px-1.5 py-0.5 rounded ml-auto">{{ ruleItems.length }}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div v-if="rulesLoaded && Object.keys(groupedRules).length === 0" class="p-4 text-center"><p class="text-slate-400">rules.csv 文件中未找到规则数据</p></div>
                        </div>
                    </div>

                    <div v-show="currentTab === 'sources'" class="flex-1 overflow-y-auto p-4">
                        <div class="mb-4">
                            <div v-if="loadingStandards" class="p-3 status-info rounded"><div class="flex items-center gap-2"><span class="iconify animate-spin text-blue-400" data-icon="mdi:loading"></span><span class="text-blue-300">正在加载标准规范数据...</span></div></div>
                            <div v-if="!loadingStandards && standardsLoaded" class="p-3 status-success rounded"><div class="grid grid-cols-2 gap-3"><div class="text-center p-2 bg-slate-800/50 rounded"><p class="text-xs text-slate-400">规范类别</p><p class="text-lg font-bold text-white">{{ Object.keys(groupedStandards).length }} 类</p></div><div class="text-center p-2 bg-slate-800/50 rounded"><p class="text-xs text-slate-400">收录标准</p><p class="text-lg font-bold text-white">{{ totalStandards }} 项</p></div></div></div>
                            <div v-if="!loadingStandards && standardsError" class="p-3 status-error rounded"><div class="flex items-center gap-2"><span class="iconify text-red-400" data-icon="mdi:alert-circle"></span><span class="text-red-300">{{ standardsError }}</span></div></div>
                        </div>
                        <div v-if="standardsLoaded">
                            <div class="section-title"><span class="iconify" data-icon="mdi:file-document-multiple"></span>标准分类</div>
                            <div class="space-y-2">
                                <div v-for="(items, category) in groupedStandards" :key="category" class="tree-category">
                                    <div class="flex items-center gap-2 p-2 rounded hover:bg-slate-800 cursor-pointer" @click="toggleStandardCategory(category)">
                                        <span class="iconify transition-transform" :class="{ 'rotate-90': expandedStandardCategories[category] }" data-icon="mdi:chevron-right"></span>
                                        <span class="text-orange-400 font-semibold text-sm">{{ category }}</span>
                                        <span class="text-xs bg-slate-700 px-2 py-0.5 rounded-full ml-auto">{{ items.length }}</span>
                                    </div>
                                    <div v-show="expandedStandardCategories[category]" class="ml-5 space-y-1">
                                        <div v-for="std in items" :key="std.id" class="tree-item p-2 rounded cursor-pointer" :class="{ 'active': selectedStandard && selectedStandard.id === std.id }" @click="selectStandard(std)">
                                            <div class="flex items-start gap-2">
                                                <span class="iconify text-amber-400 mt-0.5 flex-shrink-0" data-icon="mdi:book-open-variant"></span>
                                                <div class="min-w-0"><p class="text-sm leading-snug truncate">{{ std.name }}</p><p class="text-xs text-slate-500 font-mono mt-0.5">{{ std.code }}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div v-show="currentTab === 'indicators'" class="flex-1 overflow-y-auto p-4">
                        <div class="mb-6">
                            <div class="section-title"><span class="iconify" data-icon="mdi:database"></span>数据源状态</div>
