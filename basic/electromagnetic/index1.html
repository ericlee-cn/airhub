<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>电磁环境模型 | 低空仿真系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(15, 23, 42, 0.95);
            padding: 20px 40px;
            border-bottom: 2px solid #00aaff;
            box-shadow: 0 4px 12px rgba(0, 170, 255, 0.2);
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .content {
            flex: 1;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .status-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(0, 170, 255, 0.3);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
        }
        .status-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(251, 146, 60, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 146, 60, 0.4);
        }
        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .feature-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .feature-item:hover {
            border-color: rgba(0, 170, 255, 0.4);
            background: rgba(0, 170, 255, 0.05);
            transform: translateY(-4px);
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
        }
        .feature-desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 170, 255, 0.1);
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .back-link:hover {
            background: rgba(0, 170, 255, 0.2);
            color: #93c5fd;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 电磁环境模型</h1>
    </div>

    <div class="content">
        <a href="index.html" class="back-link">
            ← 返回资源总览
        </a>

        <div class="status-card">
            <div class="status-title">
                模块状态
                <span class="status-badge">开发中</span>
            </div>
            <p style="color: #94a3b8; line-height: 1.8; margin-top: 16px;">
                电磁环境模型模块正在开发中。该模块将提供电磁频谱分析、信号覆盖模拟、干扰检测等电磁环境仿真功能。
            </p>
        </div>

        <div class="status-card">
            <div class="status-title">📋 功能规划</div>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <div class="feature-title">频谱分析</div>
                    <div class="feature-desc">电磁频谱实时监测、频段占用分析、频谱可视化展示</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📡</div>
                    <div class="feature-title">信号覆盖</div>
                    <div class="feature-desc">通信信号覆盖范围模拟、信号强度可视化、盲区检测</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔍</div>
                    <div class="feature-title">干扰检测</div>
                    <div class="feature-desc">电磁干扰源定位、干扰强度分析、干扰影响评估</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🗺️</div>
                    <div class="feature-title">空间分布</div>
                    <div class="feature-desc">电磁场空间分布可视化、三维场强展示、热力图呈现</div>
                </div>
            </div>
        </div>

        <div class="status-card">
            <div class="status-title">📝 技术说明</div>
            <p style="color: #94a3b8; line-height: 1.8;">
                该模块将集成专业的电磁仿真引擎，支持多种电磁场景建模。通过三维可视化技术，将电磁环境数据以直观的方式呈现，为低空飞行安全提供电磁环境保障。
            </p>
        </div>
    </div>
</body>
</html>
