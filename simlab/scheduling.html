<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>实验调度 - 低空经济仿真验证平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .sidebar-item-active { background: linear-gradient(90deg, rgba(22, 119, 255, 0.2) 0%, rgba(22, 119, 255, 0) 100%); border-left: 4px solid #1677ff; color: #1677ff; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .progress-inner { height: 100%; background: #1677ff; transition: width 0.5s ease; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
<!-- 侧边导航 -->
<aside class="w-64 border-r border-slate-800 flex flex-col bg-slate-900">
<div class="p-6 flex items-center gap-3">
<span class="iconify text-3xl text-blue-500" data-icon="ri:drone-fill"></span>
<span class="font-bold text-lg tracking-wider">低空仿真系统</span>
</div>
<nav class="flex-1 mt-4 px-3 space-y-1">
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="index.html">
<span class="iconify" data-icon="ri:dashboard-3-line"></span> 实验列表
            </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="design.html">
<span class="iconify" data-icon="ri:edit-box-line"></span> 实验设计
            </a>
<a class="sidebar-item-active flex items-center gap-3 p-3 rounded-lg transition-all" href="scheduling.html">
<span class="iconify" data-icon="ri:list-settings-line"></span> 实验调度
            </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="monitor.html">
<span class="iconify" data-icon="ri:radar-line"></span> 执行监控
            </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="result.html">
<span class="iconify" data-icon="ri:pie-chart-2-line"></span> 单轮结果
            </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="comparison.html">
<span class="iconify" data-icon="ri:bubble-chart-line"></span> 多轮对比
            </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="iteration.html">
<span class="iconify" data-icon="ri:history-line"></span> 迭代记录
            </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-800 transition-all" href="log-audit.html">
<span class="iconify" data-icon="ri:file-list-3-line"></span> 日志审计
            </a>
</nav>
<div class="p-6 border-t border-slate-800 text-sm text-slate-500">2026-03-10</div>
</aside>
<main class="flex-1 flex flex-col overflow-hidden bg-[#0a0f1c]">
<header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50">
<h1 class="text-xl font-semibold">底层算力与任务调度</h1>
<div class="flex gap-4">
<div class="flex items-center gap-2 mr-6">
<span class="text-xs text-slate-400 uppercase">GPU 利用率</span>
<span class="text-green-500 font-mono">42%</span>
</div>
<button class="bg-red-500/10 text-red-500 px-4 py-2 rounded-md text-sm border border-red-500/20">一键停止所有</button>
<button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md text-sm">启动算力分配</button>
</div>
</header>
<section class="flex-1 overflow-y-auto p-8 space-y-8">
<!-- 资源看板 -->
<div class="grid grid-cols-3 gap-6">
<div class="glass-card p-6 rounded-xl">
<div class="flex justify-between items-start mb-4">
<span class="iconify text-blue-500 text-2xl" data-icon="ri:server-line"></span>
<span class="text-xs text-green-500 bg-green-500/10 px-2 py-0.5 rounded">运行中</span>
</div>
<div class="text-xs text-slate-400 uppercase mb-1">仿真服务器 A-Cluster</div>
<div class="text-xl font-bold mb-4">负载: High (88%)</div>
<div class="progress-bar"><div class="progress-inner" style="width: 88%"></div></div>
</div>
<div class="glass-card p-6 rounded-xl">
<div class="flex justify-between items-start mb-4">
<span class="iconify text-purple-500 text-2xl" data-icon="ri:cpu-line"></span>
<span class="text-xs text-green-500 bg-green-500/10 px-2 py-0.5 rounded">就绪</span>
</div>
<div class="text-xs text-slate-400 uppercase mb-1">计算单元 B-Core</div>
<div class="text-xl font-bold mb-4">负载: Low (15%)</div>
<div class="progress-bar"><div class="progress-inner bg-purple-500" style="width: 15%"></div></div>
</div>
<div class="glass-card p-6 rounded-xl">
<div class="flex justify-between items-start mb-4">
<span class="iconify text-yellow-500 text-2xl" data-icon="ri:database-2-line"></span>
<span class="text-xs text-slate-500 bg-white/5 px-2 py-0.5 rounded">维护</span>
</div>
<div class="text-xs text-slate-400 uppercase mb-1">数据仓库 Storage-Z</div>
<div class="text-xl font-bold mb-4">负载: Idle (0%)</div>
<div class="progress-bar"><div class="progress-inner bg-slate-700" style="width: 0%"></div></div>
</div>
</div>
<!-- 执行队列 -->
<div class="glass-card rounded-xl">
<div class="p-6 border-b border-white/5 font-bold">仿真执行队列 (2026-03-10)</div>
<div class="p-6 space-y-6">
<!-- Task 1 -->
<div class="flex items-center gap-6 p-4 bg-white/5 rounded-lg border border-white/5">
<div class="w-12 h-12 flex items-center justify-center bg-blue-500/20 rounded-lg text-blue-500 font-bold">01</div>
<div class="flex-1">
<div class="flex justify-between mb-2">
<span class="text-sm font-medium italic">EXP-20260310-001 (基线方案)</span>
<span class="text-xs text-blue-400">进行中... 75%</span>
</div>
<div class="progress-bar"><div class="progress-inner" style="width: 75%"></div></div>
</div>
<div class="flex gap-4">
<span class="text-xs text-slate-500">耗时: 12m 30s</span>
<a class="text-xs text-blue-500 hover:underline" href="monitor.html">查看监控</a>
</div>
</div>
<!-- Task 2 -->
<div class="flex items-center gap-6 p-4 bg-white/5 rounded-lg border border-white/5">
<div class="w-12 h-12 flex items-center justify-center bg-slate-700/20 rounded-lg text-slate-500 font-bold text-sm">Wait</div>
<div class="flex-1 opacity-50">
<div class="flex justify-between mb-2">
<span class="text-sm font-medium italic">EXP-20260310-001 (对照组A - 10m/s)</span>
<span class="text-xs text-slate-500">队列等候中</span>
</div>
<div class="progress-bar"><div class="progress-inner opacity-0" style="width: 0%"></div></div>
</div>
<div class="flex gap-4">
<button class="text-xs text-slate-500">取消</button>
<button class="text-xs text-blue-500">置顶</button>
</div>
</div>
</div>
</div>
</section>
</main>
</body>
</html>
