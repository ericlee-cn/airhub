<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞行计划管理</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f172a;
        }
        #cesiumContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* 左侧面板 */
        #leftPanel {
            position: absolute;
            left: 0;
            top: 0;
            width: 300px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        #leftPanel.collapsed {
            transform: translateX(-260px);
        }
        #leftPanel .header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #leftPanel .header h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: #e2e8f0;
        }
        #leftPanel .plan-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        #leftPanel .plan-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        #leftPanel .plan-item:hover {
            background: rgba(51, 65, 85, 0.9);
            border-color: rgba(96, 165, 250, 0.4);
        }
        #leftPanel .plan-item.selected {
            background: rgba(30, 64, 175, 0.4);
            border-color: #3b82f6;
        }
        #leftPanel .plan-item .checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid #64748b;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        #leftPanel .plan-item.selected .checkbox {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        #leftPanel .plan-item .checkbox svg {
            display: none;
            width: 12px;
            height: 12px;
            color: white;
        }
        #leftPanel .plan-item.selected .checkbox svg {
            display: block;
        }
        #leftPanel .plan-item h3 {
            margin: 0 0 6px 0;
            font-size: 13px;
            font-weight: 600;
            color: #f1f5f9;
            padding-right: 26px;
        }
        #leftPanel .plan-item p {
            margin: 0;
            font-size: 11px;
            color: #94a3b8;
        }
        #leftPanel .plan-item .tags {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        #leftPanel .plan-item .tag {
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }
        #leftPanel .plan-item .tag.time {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        /* 底部操作栏 */
        #actionBar {
            padding: 10px 16px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.98);
        }
        #actionBar .selected-count {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        #actionBar .selected-count span {
            color: #3b82f6;
            font-weight: 600;
        }
        #actionBar .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #actionBar .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        #actionBar .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-1px);
        }
        #actionBar .btn-primary:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }
        /* 右侧详情面板 */
        #rightPanel {
            position: absolute;
            right: 0;
            top: 0;
            width: 340px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        #rightPanel.visible {
            transform: translateX(0);
        }
        #rightPanel .header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #rightPanel .header h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: #e2e8f0;
        }
        #rightPanel .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(100, 116, 139, 0.3);
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        #rightPanel .close-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        #rightPanel .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        #rightPanel .section {
            margin-bottom: 16px;
        }
        #rightPanel .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #rightPanel .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(100, 116, 139, 0.3);
        }
        #rightPanel .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        #rightPanel .info-item {
            background: rgba(30, 41, 59, 0.6);
            padding: 10px;
            border-radius: 6px;
        }
        #rightPanel .info-item.full {
            grid-column: span 2;
        }
        #rightPanel .info-item label {
            font-size: 10px;
            color: #64748b;
            display: block;
            margin-bottom: 3px;
        }
        #rightPanel .info-item span {
            font-size: 13px;
            color: #e2e8f0;
            font-weight: 500;
        }
        /* 航线点列表 */
        #rightPanel .waypoint-list {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 6px;
            overflow: hidden;
        }
        #rightPanel .waypoint-item {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(100, 116, 139, 0.2);
        }
        #rightPanel .waypoint-item:last-child {
            border-bottom: none;
        }
        #rightPanel .waypoint-item .num {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }
        #rightPanel .waypoint-item .info {
            flex: 1;
        }
        #rightPanel .waypoint-item .info .name {
            font-size: 12px;
            font-weight: 500;
            color: #e2e8f0;
        }
        #rightPanel .waypoint-item .info .coords {
            font-size: 11px;
            color: #64748b;
            margin-top: 1px;
        }
        #rightPanel .waypoint-item .altitude {
            font-size: 12px;
            color: #60a5fa;
            font-weight: 500;
        }
        /* 收起/展开按钮 */
        .toggle-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 36px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            transition: all 0.2s;
        }
        .toggle-btn:hover {
            background: rgba(51, 65, 85, 0.9);
            color: #e2e8f0;
        }
        #leftToggle {
            left: 300px;
            border-radius: 0 6px 6px 0;
        }
        #leftToggle.collapsed {
            left: 40px;
        }
        #rightToggle {
            right: 340px;
            border-radius: 6px 0 0 6px;
        }
        #rightToggle.hidden {
            right: 0;
        }
        /* 工具栏 */
        #toolbar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            gap: 6px;
            z-index: 100;
        }
        #toolbar button {
            padding: 6px 12px;
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #toolbar button:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }
        #toolbar button.active {
            background: rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
        }
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.4);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.6);
        }
    </style>
</head>
<body>
    <!-- Cesium地图容器 -->
    <div id="cesiumContainer"></div>

    <!-- 顶部工具栏 -->
    <div id="toolbar">
        <button id="btnDrawRoute" onclick="drawSelectedRoutes()">绘制选中航线</button>
        <button id="btnClearRoute" onclick="clearRoutes()">清除航线</button>
        <button onclick="zoomToAll()">显示全部</button>
    </div>

    <!-- 左侧面板 - 飞行计划列表 -->
    <div id="leftPanel">
        <div class="header">
            <h2>飞行计划列表</h2>
            <span id="planCount" style="color: #64748b; font-size: 13px;">0 个计划</span>
        </div>
        <div class="plan-list" id="planList">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
        <div id="actionBar">
            <div class="selected-count">已选择 <span id="selectedCount">0</span> 个计划</div>
            <button class="btn btn-primary" id="btnAddToScenario" onclick="addToScenario()" disabled>
                加入当前想定
            </button>
        </div>
    </div>
    <button class="toggle-btn" id="leftToggle" onclick="toggleLeftPanel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <!-- 右侧面板 - 计划详情 -->
    <div id="rightPanel">
        <div class="header">
            <h2>计划详情</h2>
            <button class="close-btn" onclick="closeRightPanel()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="detail-content" id="detailContent">
            <!-- 详情内容将通过JS动态填充 -->
        </div>
    </div>
    <button class="toggle-btn hidden" id="rightToggle" onclick="toggleRightPanel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>

    <script>
        // 全局变量
        let flightPlans = [];
        let selectedPlans = new Set();
        let clickedPlan = null;
        let viewer = null;
        let routeEntities = [];
        let waypointEntities = [];

        // 初始化Cesium
        function initCesium() {
            Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYTRiOGY4Yi1mYjIwLTRlZTgtOWU4ZS0yNWJjOGVhM2QyNGEiLCJpZCI6MjU5LCJzY29wZXMiOlsiYXNsIiwiYXNyIiwiYXN3IiwiZ2MiXSwiaWF0IjoxNDkzNTM4NzY5fQ.Oz3BqYFf8Hb82tJ0Lxx0X2M2MMX0MN0xlOmK0zD0QfI';
            
            viewer = new Cesium.Viewer('cesiumContainer', {
                animation: false,
                timeline: false,
                baseLayerPicker: true,
                geocoder: false,
                homeButton: true,
                sceneModePicker: true,
                navigationHelpButton: false,
                selectionIndicator: false,
                infoBox: false
            });

            // 设置初始视角 - 浙江区域
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(120.0, 30.55, 50000)
            });

            // 添加高德卫星影像
            viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
                url: 'https://webst02.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}'
            }));

            console.log('Cesium initialized');
        }

        // 自动加载同目录下的 flyplanlist.json
        async function loadFlightPlans() {
            document.getElementById('planList').innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:10px">正在加载数据...</p></div>';
            
            try {
                // 使用 XMLHttpRequest 以便支持进度显示
                const data = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', 'flyplanlist.json', true);
                    xhr.responseType = 'text';
                    
                    xhr.onprogress = function(e) {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            document.querySelector('#planList .loading p').textContent = `正在加载数据... ${percent}%`;
                        }
                    };
                    
                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            resolve(xhr.response);
                        } else {
                            reject(new Error('加载失败: ' + xhr.status));
                        }
                    };
                    
                    xhr.onerror = () => reject(new Error('网络错误'));
                    xhr.send();
                });
                
                document.querySelector('#planList .loading p').textContent = '正在解析数据...';
                
                // 使用 setTimeout 让 UI 有机会更新
                await new Promise(resolve => setTimeout(resolve, 10));
                
                flightPlans = JSON.parse(data);
                
                renderPlanList();
                document.getElementById('planCount').textContent = `${flightPlans.length} 个计划`;
                updateSelectedCount();
                
                // 自动缩放到所有计划
                setTimeout(zoomToAll, 500);
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('planList').innerHTML = '<div class="loading">加载失败: ' + error.message + '</div>';
            }
        }

        // 渲染计划列表
        function renderPlanList() {
            const container = document.getElementById('planList');
            container.innerHTML = '';

            flightPlans.forEach((plan, index) => {
                const item = document.createElement('div');
                item.className = `plan-item ${selectedPlans.has(index) ? 'selected' : ''}`;
                item.onclick = (e) => {
                    // 如果点击的是复选框区域，不触发选择
                    if (e.target.closest('.checkbox')) {
                        toggleSelection(index, e);
                    } else {
                        showDetail(index);
                    }
                };

                const timeRange = plan.faa_planflightTime?.timeRange || [];
                const startTime = timeRange[0] || '未设置';
                const endTime = timeRange[1] || '未设置';

                item.innerHTML = `
                    <div class="checkbox" onclick="toggleSelection(${index}, event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <h3>${plan.faa_applyName || '未命名计划'}</h3>
                    <p>申请号: ${plan.faa_applyNo || '-'}</p>
                    <p>申请人: ${plan.applicatName || '-'} | ${plan.tel_commuber || '-'}</p>
                    <div class="tags">
                        <span class="tag">${plan.flyPlanUav || '未知机型'}</span>
                        <span class="tag time">飞行时间: ${startTime.split(' ')[1] || startTime} - ${endTime.split(' ')[1] || endTime}</span>
                    </div>
                `;

                container.appendChild(item);
            });
        }

        // 切换选择状态
        function toggleSelection(index, event) {
            event.stopPropagation();
            
            if (selectedPlans.has(index)) {
                selectedPlans.delete(index);
            } else {
                selectedPlans.add(index);
            }

            renderPlanList();
            updateSelectedCount();
        }

        // 更新选中数量
        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedPlans.size;
            document.getElementById('btnAddToScenario').disabled = selectedPlans.size === 0;
        }

        // 显示计划详情
        function showDetail(index) {
            clickedPlan = flightPlans[index];
            const panel = document.getElementById('rightPanel');
            const toggle = document.getElementById('rightToggle');
            
            panel.classList.add('visible');
            toggle.classList.remove('hidden');

            renderDetail(clickedPlan);
            
            // 地图定位到该航线
            if (clickedPlan.flightAirroute && clickedPlan.flightAirroute.length > 0) {
                const points = clickedPlan.flightAirroute;
                const avgLon = points.reduce((sum, p) => sum + p.longitude, 0) / points.length;
                const avgLat = points.reduce((sum, p) => sum + p.latitude, 0) / points.length;
                
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(avgLon, avgLat, 5000),
                    duration: 1
                });
            }
        }

        // 渲染详情内容
        function renderDetail(plan) {
            const container = document.getElementById('detailContent');
            const timeRange = plan.faa_planflightTime?.timeRange || [];
            
            let html = `
                <div class="section">
                    <div class="section-title">基本信息</div>
                    <div class="info-grid">
                        <div class="info-item full">
                            <label>计划名称</label>
                            <span>${plan.faa_applyName || '未命名'}</span>
                        </div>
                        <div class="info-item">
                            <label>申请号</label>
                            <span>${plan.faa_applyNo || '-'}</span>
                        </div>
                        <div class="info-item">
                            <label>申请类型</label>
                            <span>${getApplyTypeName(plan.faa_applyType)}</span>
                        </div>
                        <div class="info-item">
                            <label>申请人</label>
                            <span>${plan.applicatName || '-'}</span>
                        </div>
                        <div class="info-item">
                            <label>联系电话</label>
                            <span>${plan.tel_commuber || '-'}</span>
                        </div>
                        <div class="info-item">
                            <label>飞行员ID</label>
                            <span>${plan.flyPilotId || '-'}</span>
                        </div>
                        <div class="info-item">
                            <label>无人机型号</label>
                            <span>${plan.flyPlanUav || '-'}</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">飞行时间</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>开始时间</label>
                            <span>${timeRange[0] || '未设置'}</span>
                        </div>
                        <div class="info-item">
                            <label>结束时间</label>
                            <span>${timeRange[1] || '未设置'}</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">航线航点 (${plan.flightAirroute?.length || 0} 个)</div>
                    <div class="waypoint-list">
            `;

            if (plan.flightAirroute && plan.flightAirroute.length > 0) {
                plan.flightAirroute.forEach((point, idx) => {
                    html += `
                        <div class="waypoint-item">
                            <div class="num">${idx + 1}</div>
                            <div class="info">
                                <div class="name">${point.name || `P${idx + 1}`}</div>
                                <div class="coords">${point.longitude.toFixed(6)}, ${point.latitude.toFixed(6)}</div>
                            </div>
                            <div class="altitude">${point.altitude}m</div>
                        </div>
                    `;
                });
            } else {
                html += '<div class="waypoint-item"><div class="info"><span style="color:#64748b">暂无航线数据</span></div></div>';
            }

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 获取申请类型名称
        function getApplyTypeName(type) {
            const types = {
                0: '新申请',
                1: '修改',
                2: '延期',
                3: '取消'
            };
            return types[type] || '未知';
        }

        // 关闭右侧面板
        function closeRightPanel() {
            document.getElementById('rightPanel').classList.remove('visible');
            document.getElementById('rightToggle').classList.add('hidden');
            clickedPlan = null;
        }

        // 切换左侧面板
        function toggleLeftPanel() {
            const panel = document.getElementById('leftPanel');
            const toggle = document.getElementById('leftToggle');
            panel.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
            
            if (panel.classList.contains('collapsed')) {
                toggle.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>';
            } else {
                toggle.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>';
            }
        }

        // 切换右侧面板
        function toggleRightPanel() {
            const panel = document.getElementById('rightPanel');
            const toggle = document.getElementById('rightToggle');
            
            if (panel.classList.contains('visible')) {
                closeRightPanel();
            } else if (clickedPlan) {
                panel.classList.add('visible');
                toggle.classList.add('hidden');
            }
        }

        // 绘制选中航线
        function drawSelectedRoutes() {
            clearRoutes();
            
            if (selectedPlans.size === 0) {
                alert('请先选择至少一个飞行计划');
                return;
            }

            const colors = [
                Cesium.Color.fromCssColorString('#3b82f6'),
                Cesium.Color.fromCssColorString('#22c55e'),
                Cesium.Color.fromCssColorString('#f59e0b'),
                Cesium.Color.fromCssColorString('#ef4444'),
                Cesium.Color.fromCssColorString('#8b5cf6'),
                Cesium.Color.fromCssColorString('#ec4899'),
                Cesium.Color.fromCssColorString('#06b6d4'),
                Cesium.Color.fromCssColorString('#84cc16')
            ];

            let colorIndex = 0;

            selectedPlans.forEach(index => {
                const plan = flightPlans[index];
                if (!plan.flightAirroute || plan.flightAirroute.length === 0) return;

                const positions = plan.flightAirroute.map(p => 
                    Cesium.Cartesian3.fromDegrees(p.longitude, p.latitude, p.altitude)
                );

                const color = colors[colorIndex % colors.length];
                colorIndex++;

                // 绘制航线
                const routeEntity = viewer.entities.add({
                    name: plan.faa_applyName,
                    polyline: {
                        positions: positions,
                        width: 3,
                        material: new Cesium.PolylineGlowMaterialProperty({
                            glowPower: 0.2,
                            color: color
                        }),
                        clampToGround: false
                    }
                });
                routeEntities.push(routeEntity);

                // 绘制航点
                plan.flightAirroute.forEach((point, idx) => {
                    const waypointEntity = viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(point.longitude, point.latitude, point.altitude),
                        point: {
                            pixelSize: 10,
                            color: color,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 2
                        },
                        label: {
                            text: point.name || `P${idx + 1}`,
                            font: '12px Noto Sans SC',
                            fillColor: Cesium.Color.WHITE,
                            style: Cesium.LabelStyle.FILL,
                            pixelOffset: new Cesium.Cartesian2(0, -15),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY
                        }
                    });
                    waypointEntities.push(waypointEntity);
                });
            });

            // 调整视角
            if (routeEntities.length > 0) {
                zoomToRoutes();
            }

            document.getElementById('btnDrawRoute').classList.add('active');
        }

        // 清除航线
        function clearRoutes() {
            routeEntities.forEach(entity => viewer.entities.remove(entity));
            waypointEntities.forEach(entity => viewer.entities.remove(entity));
            routeEntities = [];
            waypointEntities = [];
            document.getElementById('btnDrawRoute').classList.remove('active');
        }

        // 缩放到航线
        function zoomToRoutes() {
            if (routeEntities.length === 0) return;

            let minLon = Infinity, maxLon = -Infinity;
            let minLat = Infinity, maxLat = -Infinity;

            selectedPlans.forEach(index => {
                const plan = flightPlans[index];
                if (!plan.flightAirroute) return;
                
                plan.flightAirroute.forEach(p => {
                    minLon = Math.min(minLon, p.longitude);
                    maxLon = Math.max(maxLon, p.longitude);
                    minLat = Math.min(minLat, p.latitude);
                    maxLat = Math.max(maxLat, p.latitude);
                });
            });

            const centerLon = (minLon + maxLon) / 2;
            const centerLat = (minLat + maxLat) / 2;
            const span = Math.max(maxLon - minLon, maxLat - minLat) * 1.5;

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, span * 111000),
                duration: 1
            });
        }

        // 缩放到全部
        function zoomToAll() {
            if (flightPlans.length === 0) return;

            let minLon = Infinity, maxLon = -Infinity;
            let minLat = Infinity, maxLat = -Infinity;

            flightPlans.forEach(plan => {
                if (!plan.flightAirroute) return;
                
                plan.flightAirroute.forEach(p => {
                    minLon = Math.min(minLon, p.longitude);
                    maxLon = Math.max(maxLon, p.longitude);
                    minLat = Math.min(minLat, p.latitude);
                    maxLat = Math.max(maxLat, p.latitude);
                });
            });

            if (minLon === Infinity) {
                viewer.camera.setView({
                    destination: Cesium.Cartesian3.fromDegrees(120.0, 30.55, 50000)
                });
                return;
            }

            const centerLon = (minLon + maxLon) / 2;
            const centerLat = (minLat + maxLat) / 2;
            const span = Math.max(maxLon - minLon, maxLat - minLat) * 1.5;

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, span * 111000),
                duration: 1
            });
        }

        // 加入当前想定
        function addToScenario() {
            if (selectedPlans.size === 0) {
                alert('请先选择至少一个飞行计划');
                return;
            }

            const selectedData = Array.from(selectedPlans).map(index => flightPlans[index]);
            
            // 模拟加入想定操作
            console.log('加入想定:', selectedData);
            
            alert(`已成功将 ${selectedData.size} 个飞行计划加入当前想定！\n\n计划列表:\n${selectedData.map(p => '- ' + (p.faa_applyName || '未命名')).join('\n')}`);
            
            // 可以在这里调用实际的加入想定API
            // 例如: fetch('/api/scenario/add-planes', { method: 'POST', body: JSON.stringify(selectedData) })
        }

        // 页面加载完成后初始化
        window.onload = function() {
            initCesium();
            loadFlightPlans();
        };
    </script>
