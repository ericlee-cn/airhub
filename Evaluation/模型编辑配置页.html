<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>模型编辑配置 - 低空经济仿真验证平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #0b1222; color: #94a3b8; font-family: "Inter", system-ui, sans-serif; }
        .tech-card { background: rgba(13, 25, 48, 0.8); border: 1px solid #1e3a8a; }
        .weight-input { background: #0d1930; border: 1px solid #1e3a8a; color: white; text-align: center; }
        .nav-active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="overflow-hidden">
<div class="flex h-screen w-full">
<!-- 左侧导航 -->
<aside class="w-64 border-r border-blue-900/50 flex flex-col">
<div class="p-6 flex items-center gap-3">
<span class="iconify text-3xl text-blue-500" data-icon="solar:Widget-5-bold-duotone"></span>
<h1 class="text-white font-bold tracking-wider">仿真评估子系统</h1>
</div>
<nav class="flex-1 mt-4">
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估首页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:home-2-bold"></span> 评估首页
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估执行页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:play-bold"></span> 评估执行
                </a>
<a class="flex items-center px-6 py-4 nav-active" href="评估模型管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:box-bold"></span> 模型管理
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="评估结果管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:document-bold"></span> 结果档案
                </a>
</nav>
</aside>
<main class="flex-1 flex flex-col">
<header class="h-16 border-b border-blue-900/50 flex items-center justify-between px-8">
<div class="flex items-center gap-4">
<a class="text-blue-400 hover:text-white flex items-center gap-1" href="评估模型管理页.html">
<span class="iconify" data-icon="solar:arrow-left-linear"></span> 返回列表
                    </a>
<h2 class="text-white font-medium">编辑模型：MOD-001 低空物流通用模型</h2>
</div>
<div class="flex gap-3">
<button class="border border-blue-500 text-blue-400 px-6 py-2 rounded hover:bg-blue-500/10">校验配置</button>
<button class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-500" id="saveBtn">发布模型</button>
</div>
</header>
<div class="p-8 space-y-8 overflow-auto">
<!-- 基础信息 -->
<section class="tech-card p-6">
<h3 class="text-white mb-6 flex items-center gap-2"><span class="iconify text-blue-400" data-icon="solar:info-circle-bold"></span> 基础定义</h3>
<div class="grid grid-cols-2 gap-8">
<div>
<label class="block mb-2 text-sm text-slate-400">模型名称</label>
<input class="w-full bg-[#0d1930] border border-blue-900/50 p-2 text-white outline-none" type="text" value="低空物流通用模型"/>
</div>
<div>
<label class="block mb-2 text-sm text-slate-400">场景分类</label>
<select class="w-full bg-[#0d1930] border border-blue-900/50 p-2 text-white outline-none">
<option selected="">城市低空物流</option>
<option>空域巡检</option>
<option>应急响应</option>
</select>
</div>
</div>
</section>
<!-- 权重配置区 -->
<section class="tech-card p-6">
<h3 class="text-white mb-6 flex items-center justify-between">
<span class="flex items-center gap-2"><span class="iconify text-blue-400" data-icon="solar:widget-5-bold"></span> 评估指标权重分配</span>
<span class="text-sm text-green-400 bg-green-500/10 px-3 py-1 rounded" id="totalLabel">当前总计：100%</span>
</h3>
<div class="grid grid-cols-4 gap-6">
<div class="p-4 bg-blue-900/20 border border-blue-500/20 rounded text-center">
<div class="text-sm mb-4">安全性权重</div>
<input class="weight-input w-20 py-2 rounded text-xl font-bold" onchange="checkTotal()" type="number" value="30"/>
<span class="ml-2">%</span>
</div>
<div class="p-4 bg-blue-900/20 border border-blue-500/20 rounded text-center">
<div class="text-sm mb-4">效率权重</div>
<input class="weight-input w-20 py-2 rounded text-xl font-bold" onchange="checkTotal()" type="number" value="25"/>
<span class="ml-2">%</span>
</div>
<div class="p-4 bg-blue-900/20 border border-blue-500/20 rounded text-center">
<div class="text-sm mb-4">合规性权重</div>
<input class="weight-input w-20 py-2 rounded text-xl font-bold" onchange="checkTotal()" type="number" value="30"/>
<span class="ml-2">%</span>
</div>
<div class="p-4 bg-blue-900/20 border border-blue-500/20 rounded text-center">
<div class="text-sm mb-4">经济性权重</div>
<input class="weight-input w-20 py-2 rounded text-xl font-bold" onchange="checkTotal()" type="number" value="15"/>
<span class="ml-2">%</span>
</div>
</div>
</section>
<!-- 算法配置 -->
<section class="tech-card p-6">
<h3 class="text-white mb-6 flex items-center gap-2"><span class="iconify text-blue-400" data-icon="solar:globus-bold"></span> 核心解析引擎</h3>
<div class="bg-black/40 p-4 border border-blue-900/50 rounded font-mono text-sm">
<div class="flex justify-between mb-2">
<span class="text-blue-500">// 评估逻辑配置脚本</span>
<span class="text-slate-500">YAML</span>
</div>
<div class="text-green-500">algorithm: AHP_Analysis_V2</div>
<div class="text-green-500">constraints:</div>
<div class="text-green-500 ml-4">- min_separation: 50m</div>
<div class="text-green-500 ml-4">- energy_threshold: 15%</div>
<div class="text-white mt-4 italic text-slate-600"># 脚本实时验证：通过 ✅</div>
</div>
</section>
</div>
</main>
</div>
<script>
        function checkTotal() {
            const inputs = document.querySelectorAll('.weight-input');
            let total = 0;
            inputs.forEach(i => total += parseInt(i.value || 0));
            const label = document.getElementById('totalLabel');
            label.innerText = `当前总计：${total}%`;
            if(total !== 100) {
                label.classList.replace('text-green-400', 'text-red-400');
                label.classList.replace('bg-green-500/10', 'bg-red-500/10');
            } else {
                label.classList.replace('text-red-400', 'text-green-400');
                label.classList.replace('bg-red-500/10', 'bg-green-500/10');
            }
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            alert('模型配置已保存，已成功发布至仿真运行中心！');
            window.location.href = '评估模型管理页.html';
        });
    </script>
</body>
</html>
