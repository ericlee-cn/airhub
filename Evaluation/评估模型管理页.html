<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>评估模型管理 - 低空经济仿真验证平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #0b1222; color: #94a3b8; font-family: "Inter", system-ui, sans-serif; }
        .tech-card { background: rgba(13, 25, 48, 0.8); border: 1px solid #1e3a8a; backdrop-filter: blur(10px); }
        .nav-active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="overflow-hidden">
<div class="flex h-screen w-full">
<!-- 左侧导航 -->
<aside class="w-64 border-r border-blue-900/50 flex flex-col">
<div class="p-6 flex items-center gap-3">
<span class="iconify text-3xl text-blue-500" data-icon="solar:Widget-5-bold-duotone"></span>
<h1 class="text-white font-bold tracking-wider">仿真评估子系统</h1>
</div>
<nav class="flex-1 mt-4">
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估首页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:home-2-bold"></span> 评估首页
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估执行页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:play-bold"></span> 评估执行
                </a>
<a class="flex items-center px-6 py-4 nav-active" href="评估模型管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:box-bold"></span> 模型管理
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="评估结果管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:document-bold"></span> 结果档案
                </a>
</nav>
</aside>
<main class="flex-1 flex flex-col">
<header class="h-16 border-b border-blue-900/50 flex items-center justify-between px-8">
<h2 class="text-white font-medium">评估模型库</h2>
<a class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded flex items-center gap-2" href="model-editor.html" onclick="alert('即将跳转至模型编辑器模块'); event.preventDefault(); window.location.href='模型编辑配置页.html'">
<span class="iconify" data-icon="solar:add-circle-bold"></span> 新建评估模型
                </a>
</header>
<div class="p-8">
<!-- 筛选区 -->
<div class="tech-card p-4 mb-6 flex flex-wrap gap-4">
<div class="flex items-center bg-[#0d1930] border border-blue-900/50 rounded px-3 w-64">
<span class="iconify mr-2" data-icon="solar:magnifer-linear"></span>
<input class="bg-transparent py-2 outline-none text-white text-sm w-full" placeholder="搜索模型名称或ID..." type="text"/>
</div>
<select class="bg-[#0d1930] border border-blue-900/50 rounded px-4 py-2 text-sm outline-none">
<option>所有场景类型</option>
<option>城市低空物流</option>
<option>电力巡检</option>
<option>应急救援</option>
</select>
<select class="bg-[#0d1930] border border-blue-900/50 rounded px-4 py-2 text-sm outline-none">
<option>状态: 全部</option>
<option>启用中</option>
<option>已禁用</option>
</select>
</div>
<!-- 列表区 -->
<div class="tech-card overflow-hidden">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-blue-900/30 text-white text-sm border-b border-blue-900/50">
<th class="p-4 font-medium">模型 ID</th>
<th class="p-4 font-medium">模型名称</th>
<th class="p-4 font-medium">最后更新</th>
<th class="p-4 font-medium">版本</th>
<th class="p-4 font-medium">状态</th>
<th class="p-4 font-medium">操作</th>
</tr>
</thead>
<tbody class="text-sm divide-y divide-blue-900/30">
<tr class="hover:bg-blue-900/10">
<td class="p-4 text-blue-400">MOD-001</td>
<td class="p-4 text-white">低空物流通用模型</td>
<td class="p-4">2026-02-01</td>
<td class="p-4">V1.0</td>
<td class="p-4">
<span class="px-2 py-1 bg-green-500/20 text-green-500 rounded text-xs">启用中</span>
</td>
<td class="p-4">
<div class="flex gap-4">
<a class="text-blue-400 hover:text-white" href="模型编辑配置页.html">配置</a>
<button class="text-red-400 hover:text-white" onclick="confirm('确定要禁用该模型吗？')">禁用</button>
</div>
</td>
</tr>
<tr class="hover:bg-blue-900/10">
<td class="p-4 text-blue-400">MOD-002</td>
<td class="p-4 text-white">空域巡检专项模型</td>
<td class="p-4">2026-02-10</td>
<td class="p-4">V1.2</td>
<td class="p-4">
<span class="px-2 py-1 bg-green-500/20 text-green-500 rounded text-xs">启用中</span>
</td>
<td class="p-4">
<div class="flex gap-4">
<a class="text-blue-400 hover:text-white" href="模型编辑配置页.html">配置</a>
<button class="text-red-400 hover:text-white">禁用</button>
</div>
</td>
</tr>
<tr class="hover:bg-blue-900/10">
<td class="p-4 text-blue-400">MOD-003</td>
<td class="p-4 text-white">应急救援评估模型</td>
<td class="p-4">2026-02-15</td>
<td class="p-4">V1.0</td>
<td class="p-4">
<span class="px-2 py-1 bg-slate-500/20 text-slate-500 rounded text-xs">已禁用</span>
</td>
<td class="p-4">
<div class="flex gap-4">
<a class="text-blue-400 hover:text-white" href="模型编辑配置页.html">配置</a>
<button class="text-green-400 hover:text-white">启用</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
</div>
</main>
</div>
</body>
</html>
