<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>评估报告详情 - 低空经济仿真验证平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
        body { background-color: #0b1222; color: #94a3b8; font-family: "Inter", system-ui, sans-serif; }
        .tech-card { background: rgba(13, 25, 48, 0.8); border: 1px solid #1e3a8a; backdrop-filter: blur(10px); }
        .nav-active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="overflow-hidden">
<div class="flex h-screen w-full">
<aside class="w-64 border-r border-blue-900/50 flex flex-col">
<div class="p-6 flex items-center gap-3">
<span class="iconify text-3xl text-blue-500" data-icon="solar:Widget-5-bold-duotone"></span>
<h1 class="text-white font-bold tracking-wider">仿真评估子系统</h1>
</div>
<nav class="flex-1 mt-4">
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估首页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:home-2-bold"></span> 评估首页
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估执行页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:play-bold"></span> 评估执行
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="评估模型管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:box-bold"></span> 模型管理
                </a>
<a class="flex items-center px-6 py-4 nav-active" href="评估结果管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:document-bold"></span> 结果档案
                </a>
</nav>
</aside>
<main class="flex-1 overflow-auto">
<header class="h-16 border-b border-blue-900/50 flex items-center justify-between px-8 sticky top-0 bg-[#0b1222] z-10">
<div class="flex items-center gap-4">
<a class="text-blue-400 flex items-center gap-1" href="评估结果管理页.html">
<span class="iconify" data-icon="solar:arrow-left-linear"></span> 返回
                    </a>
<h2 class="text-white font-medium">仿真评估结果分析报告 [REP-20260309-A3]</h2>
</div>
<div class="flex gap-4">
<button class="flex items-center gap-2 bg-blue-600/20 text-blue-400 px-4 py-2 border border-blue-600/50 rounded text-sm">
<span class="iconify" data-icon="solar:printer-bold"></span> 导出 PDF/Word
                    </button>
</div>
</header>
<div class="p-8 space-y-8">
<!-- 第一行：多维评分 -->
<div class="grid grid-cols-3 gap-8">
<div class="tech-card p-6 flex flex-col items-center justify-center">
<div class="text-6xl font-bold text-green-500 glow-text mb-2">92.5</div>
<div class="text-sm text-slate-400 uppercase tracking-widest">综合评估得分</div>
<div class="mt-4 px-4 py-1 bg-green-500/10 text-green-400 rounded-full text-xs">结论：高度推荐执飞</div>
</div>
<div class="col-span-2 tech-card p-6">
<h3 class="text-white mb-2 text-sm font-bold">维度对比 Radar</h3>
<div class="w-full h-64" id="radarChart"></div>
</div>
</div>
<!-- 第二行：诊断清单 -->
<div class="grid grid-cols-2 gap-8">
<div class="tech-card p-6">
<h3 class="text-white font-bold mb-4 flex items-center gap-2">
<span class="iconify text-yellow-500" data-icon="solar:danger-bold"></span> 识别的问题清单
                        </h3>
<div class="space-y-4">
<div class="bg-yellow-500/10 border-l-4 border-yellow-500 p-4">
<div class="text-white text-sm font-bold">续航利用率不均</div>
<p class="text-xs mt-1">当前测算续航利用率仅72%，部分航线存在35%以上的能量冗余，资源分配需优化。</p>
</div>
<div class="bg-blue-500/10 border-l-4 border-blue-500 p-4">
<div class="text-white text-sm font-bold">航线绕飞率偏高</div>
<p class="text-xs mt-1">在南沙2号禁飞区边缘，航线绕飞较多，增加了12%的电力成本。</p>
</div>
</div>
</div>
<div class="tech-card p-6">
<h3 class="text-white font-bold mb-4 flex items-center gap-2">
<span class="iconify text-green-500" data-icon="solar:check-circle-bold"></span> 优化调整建议
                        </h3>
<div class="space-y-4">
<div class="bg-green-500/10 border-l-4 border-green-500 p-4">
<div class="text-white text-sm font-bold">优化航线规划算法</div>
<p class="text-xs mt-1">建议调低绕飞敏感度系数从0.8至0.6，平衡空心与安全裕度。</p>
</div>
<div class="bg-green-500/10 border-l-4 border-green-500 p-4">
<div class="text-white text-sm font-bold">梯次任务发布</div>
<p class="text-xs mt-1">将A-01组配送时间推迟15分钟，可解决空域瞬时密度超过极限的问题。</p>
</div>
</div>
</div>
</div>
</div>
</main>
</div>
<script>
        const radar = echarts.init(document.getElementById('radarChart'));
        radar.setOption({
            backgroundColor: 'transparent',
            radar: {
                indicator: [
                    { name: '安全性', max: 100 },
                    { name: '任务成功率', max: 100 },
                    { name: '经济性', max: 100 },
                    { name: '时效性', max: 100 },
                    { name: '合规性', max: 100 }
                ],
                axisName: { color: '#94a3b8' },
                splitArea: { show: false },
                splitLine: { lineStyle: { color: '#1e3a8a' } }
            },
            series: [{
                type: 'radar',
                data: [{
                    value: [98, 95, 72, 88, 100],
                    name: '当前评估值',
                    areaStyle: { color: 'rgba(59, 130, 246, 0.4)' },
                    lineStyle: { color: '#3b82f6' },
                    itemStyle: { opacity: 0 }
                }]
            }]
        });
        window.onresize = radar.resize;
    </script>
</body>
</html>
