<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>评估结果管理 - 低空经济仿真验证平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #0b1222; color: #94a3b8; font-family: "Inter", system-ui, sans-serif; }
        .tech-card { background: rgba(13, 25, 48, 0.8); border: 1px solid #1e3a8a; }
        .nav-active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="overflow-hidden">
<div class="flex h-screen w-full">
<!-- 左侧导航 -->
<aside class="w-64 border-r border-blue-900/50 flex flex-col">
<div class="p-6 flex items-center gap-3">
<span class="iconify text-3xl text-blue-500" data-icon="solar:Widget-5-bold-duotone"></span>
<h1 class="text-white font-bold tracking-wider">仿真评估子系统</h1>
</div>
<nav class="flex-1 mt-4">
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估首页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:home-2-bold"></span> 评估首页
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="仿真评估执行页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:play-bold"></span> 评估执行
                </a>
<a class="flex items-center px-6 py-4 hover:bg-blue-900/20 transition" href="评估模型管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:box-bold"></span> 模型管理
                </a>
<a class="flex items-center px-6 py-4 nav-active" href="评估结果管理页.html">
<span class="iconify mr-3 text-xl" data-icon="solar:document-bold"></span> 结果档案
                </a>
</nav>
</aside>
<main class="flex-1 flex flex-col">
<header class="h-16 border-b border-blue-900/50 flex items-center justify-between px-8">
<h2 class="text-white font-medium">仿真报告档案库</h2>
<div class="flex gap-3">
<button class="bg-blue-900/40 text-blue-400 px-4 py-2 border border-blue-500/30 rounded flex items-center gap-2">
<span class="iconify" data-icon="solar:layers-bold"></span> 批量对比报告
                    </button>
</div>
</header>
<div class="p-8">
<div class="tech-card p-4 mb-6 grid grid-cols-4 gap-4">
<div class="col-span-1">
<label class="block text-xs mb-1">日期范围</label>
<div class="flex items-center bg-[#0d1930] px-3 py-2 border border-blue-900/50 rounded gap-2">
<span class="iconify" data-icon="solar:calendar-bold text-blue-400"></span>
<span class="text-white text-sm">2026-03-01 至 2026-03-09</span>
</div>
</div>
<div>
<label class="block text-xs mb-1">评估结论</label>
<select class="w-full bg-[#0d1930] text-sm text-white py-2 px-3 border border-blue-900/50 rounded outline-none">
<option>全部结论</option>
<option>推荐执飞</option>
<option>需改进</option>
<option>存在风险</option>
</select>
</div>
</div>
<div class="tech-card overflow-hidden">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-blue-900/30 text-white text-sm border-b border-blue-900/50">
<th class="p-4 w-10"><input type="checkbox"/></th>
<th class="p-4 font-medium">任务报告 ID</th>
<th class="p-4 font-medium">仿真任务名称</th>
<th class="p-4 font-medium">对应模型</th>
<th class="p-4 font-medium">综合评分</th>
<th class="p-4 font-medium">生成时间</th>
<th class="p-4 font-medium">操作</th>
</tr>
</thead>
<tbody class="text-sm divide-y divide-blue-900/30">
<tr class="hover:bg-blue-900/10">
<td class="p-4"><input type="checkbox"/></td>
<td class="p-4 text-blue-400">REP-20260309-A3</td>
<td class="p-4 text-white">南沙枢纽站物流航线评估</td>
<td class="p-4">低空物流通用模型</td>
<td class="p-4"><span class="text-green-500 font-bold">92.5</span></td>
<td class="p-4">2026-03-09 10:30</td>
<td class="p-4">
<a class="text-blue-400 hover:underline" href="评估报告详情页.html">查看分析</a>
</td>
</tr>
<tr class="hover:bg-blue-900/10">
<td class="p-4"><input type="checkbox"/></td>
<td class="p-4 text-blue-400">REP-20260309-A2</td>
<td class="p-4 text-white">区域变电站全自动巡检</td>
<td class="p-4">空域巡检专项模型</td>
<td class="p-4"><span class="text-yellow-500 font-bold">78.0</span></td>
<td class="p-4">2026-03-09 09:12</td>
<td class="p-4">
<a class="text-blue-400 hover:underline" href="评估报告详情页.html">查看分析</a>
</td>
</tr>
<tr class="hover:bg-blue-900/10">
<td class="p-4"><input type="checkbox"/></td>
<td class="p-4 text-blue-400">REP-20260308-B5</td>
<td class="p-4 text-white">珠江口应急搜救演练</td>
<td class="p-4">应急救援评估模型</td>
<td class="p-4"><span class="text-red-500 font-bold">54.2</span></td>
<td class="p-4">2026-03-08 17:45</td>
<td class="p-4">
<a class="text-blue-400 hover:underline" href="评估报告详情页.html">查看分析</a>
</td>
</tr>
</tbody>
</table>
</div>
</div>
</main>
</div>
</body>
</html>
